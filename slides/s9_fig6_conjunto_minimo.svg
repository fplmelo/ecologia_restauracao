<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
    .tc { font-size:11px; font-weight:600; fill:#1a1a18; }
  </style>
</defs>

<text class="th" x="340" y="22" text-anchor="middle">Conjunto mínimo recomendado de métricas por objetivo analítico</text>

<!-- Cabeçalho da tabela -->
<rect x="20" y="34" width="640" height="28" rx="4" fill="#173404"/>
<text style="font-size:11px;font-weight:600;fill:white" x="100" y="52" text-anchor="middle">Métrica (sigla)</text>
<text style="font-size:11px;font-weight:600;fill:white" x="270" y="52" text-anchor="middle">Categoria</text>
<text style="font-size:11px;font-weight:600;fill:white" x="430" y="52" text-anchor="middle">O que mede</text>
<text style="font-size:11px;font-weight:600;fill:white" x="610" y="52" text-anchor="middle">Nível</text>

<!-- Linhas da tabela -->
<!-- PLAND -->
<rect x="20" y="62" width="640" height="26" rx="0" fill="#EAF3DE"/>
<text class="tc" x="100" y="79" text-anchor="middle">PLAND</text>
<text class="ts" x="270" y="79" text-anchor="middle" fill="#27500A">Composição</text>
<text class="ts" x="430" y="79" text-anchor="middle">Proporção de cada classe</text>
<text class="ts" x="610" y="79" text-anchor="middle">Class</text>

<!-- PR / SHDI -->
<rect x="20" y="88" width="640" height="26" rx="0" fill="white"/>
<text class="tc" x="100" y="105" text-anchor="middle">SHDI</text>
<text class="ts" x="270" y="105" text-anchor="middle" fill="#27500A">Composição</text>
<text class="ts" x="430" y="105" text-anchor="middle">Diversidade de tipos (Shannon)</text>
<text class="ts" x="610" y="105" text-anchor="middle">Landscape</text>

<!-- LPI -->
<rect x="20" y="114" width="640" height="26" rx="0" fill="#EAF3DE"/>
<text class="tc" x="100" y="131" text-anchor="middle">LPI</text>
<text class="ts" x="270" y="131" text-anchor="middle" fill="#27500A">Composição</text>
<text class="ts" x="430" y="131" text-anchor="middle">Dominância (maior patch)</text>
<text class="ts" x="610" y="131" text-anchor="middle">Class / Landscape</text>

<!-- NP / PD -->
<rect x="20" y="140" width="640" height="26" rx="0" fill="#E6F1FB"/>
<text class="tc" x="100" y="157" text-anchor="middle">NP / PD</text>
<text class="ts" x="270" y="157" text-anchor="middle" fill="#185FA5">Configuração</text>
<text class="ts" x="430" y="157" text-anchor="middle">Fragmentação (nº/densidade de patches)</text>
<text class="ts" x="610" y="157" text-anchor="middle">Class / Landscape</text>

<!-- ED -->
<rect x="20" y="166" width="640" height="26" rx="0" fill="#E6F1FB"/>
<text class="tc" x="100" y="183" text-anchor="middle">ED</text>
<text class="ts" x="270" y="183" text-anchor="middle" fill="#185FA5">Configuração</text>
<text class="ts" x="430" y="183" text-anchor="middle">Densidade de borda (interface)</text>
<text class="ts" x="610" y="183" text-anchor="middle">Class / Landscape</text>

<!-- AI -->
<rect x="20" y="192" width="640" height="26" rx="0" fill="#FAEEDA"/>
<text class="tc" x="100" y="209" text-anchor="middle">AI</text>
<text class="ts" x="270" y="209" text-anchor="middle" fill="#BA7517">Configuração</text>
<text class="ts" x="430" y="209" text-anchor="middle">Agregação (células adjacentes da classe)</text>
<text class="ts" x="610" y="209" text-anchor="middle">Class / Landscape</text>

<!-- ENN -->
<rect x="20" y="218" width="640" height="26" rx="0" fill="#FCEBEB"/>
<text class="tc" x="100" y="235" text-anchor="middle">ENN_MN</text>
<text class="ts" x="270" y="235" text-anchor="middle" fill="#A32D2D">Configuração</text>
<text class="ts" x="430" y="235" text-anchor="middle">Isolamento médio (distância ao vizinho)</text>
<text class="ts" x="610" y="235" text-anchor="middle">Class</text>

<!-- SHAPE / FRAC -->
<rect x="20" y="244" width="640" height="26" rx="0" fill="#E6F1FB"/>
<text class="tc" x="100" y="261" text-anchor="middle">SHAPE_MN</text>
<text class="ts" x="270" y="261" text-anchor="middle" fill="#185FA5">Configuração</text>
<text class="ts" x="430" y="261" text-anchor="middle">Forma média dos patches (complexidade)</text>
<text class="ts" x="610" y="261" text-anchor="middle">Class / Landscape</text>

<!-- Linha final da tabela -->
<rect x="20" y="34" width="640" height="236" rx="4" fill="none" stroke="#c8c6be" stroke-width="1"/>
<line x1="20" y1="62" x2="660" y2="62" stroke="#c8c6be" stroke-width="0.6"/>
<!-- Divisores de colunas -->
<line x1="180" y1="34" x2="180" y2="270" stroke="#c8c6be" stroke-width="0.5"/>
<line x1="360" y1="34" x2="360" y2="270" stroke="#c8c6be" stroke-width="0.5"/>
<line x1="570" y1="34" x2="570" y2="270" stroke="#c8c6be" stroke-width="0.5"/>

<!-- Nota rodapé -->
<rect x="20" y="278" width="640" height="28" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="0.8"/>
<text class="ts" x="340" y="296" text-anchor="middle" fill="#173404">Conjunto mínimo recomendado: PLAND + SHDI (composição) + NP/PD + ED + AI + ENN (configuração) — Cushman et al. (2008)</text>
</svg>
