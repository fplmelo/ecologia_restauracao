<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Título -->
<text class="th" x="340" y="20" text-anchor="middle">A cadeia de explicação da Ecologia Política (Blaikie &amp; Brookfield 1987)</text>

<!-- Nível 1: Global/Nacional -->
<rect x="30" y="36" width="620" height="54" rx="8" fill="#2c1a5e" opacity="0.85"/>
<text style="font-size:12px;font-weight:700;fill:#EEEDFE" x="340" y="56" text-anchor="middle">NÍVEL GLOBAL / NACIONAL</text>
<text style="font-size:11px;fill:#AFA9EC" x="340" y="73" text-anchor="middle">Mercado global de commodities · Políticas macroeconômicas · Dívida externa · Acordos comerciais · Capital transnacional</text>

<!-- Seta para baixo 1 -->
<line x1="340" y1="92" x2="340" y2="112" stroke="#7F77DD" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="106" fill="#7F77DD">pressão ↓</text>

<!-- Nível 2: Regional/Estatal -->
<rect x="30" y="114" width="620" height="54" rx="8" fill="#0C447C" opacity="0.85"/>
<text style="font-size:12px;font-weight:700;fill:#E6F1FB" x="340" y="134" text-anchor="middle">NÍVEL REGIONAL / ESTATAL</text>
<text style="font-size:11px;fill:#B5D4F4" x="340" y="151" text-anchor="middle">Políticas fundiárias · Legislação ambiental · Zoneamento · Expansão agropecuária · Obras de infraestrutura</text>

<!-- Seta para baixo 2 -->
<line x1="340" y1="170" x2="340" y2="190" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="184" fill="#378ADD">mediação ↓</text>

<!-- Nível 3: Local / Comunidade -->
<rect x="30" y="192" width="620" height="54" rx="8" fill="#173404" opacity="0.85"/>
<text style="font-size:12px;font-weight:700;fill:#C0DD97" x="340" y="212" text-anchor="middle">NÍVEL LOCAL / COMUNIDADE</text>
<text style="font-size:11px;fill:#97C459" x="340" y="229" text-anchor="middle">Práticas de uso da terra · Conflitos por recursos · Saberes tradicionais · Resistência · Identidade territorial</text>

<!-- Seta para baixo 3 -->
<line x1="340" y1="248" x2="340" y2="268" stroke="#639922" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="262" fill="#639922">expressão material ↓</text>

<!-- Nível 4: Paisagem (resultado) -->
<rect x="30" y="270" width="620" height="44" rx="8" fill="#BA7517" opacity="0.80"/>
<text style="font-size:12px;font-weight:700;fill:white" x="340" y="290" text-anchor="middle">PAISAGEM OBSERVÁVEL</text>
<text style="font-size:11px;fill:#F5E9C8" x="340" y="307" text-anchor="middle">Desmatamento · Fragmentação · Degradação · Territórios contestados · Paisagens de resistência</text>

<!-- Seta de retroalimentação (direita) -->
<path d="M655 295 Q672 200 655 46" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text style="font-size:10px;fill:#A32D2D" x="664" y="175" writing-mode="tb">retroalimentação</text>

<text class="ts" x="340" y="328" text-anchor="middle">Figura 1 — A cadeia de explicação multinível: como forças políticas e econômicas se materializam na paisagem</text>
</svg>
