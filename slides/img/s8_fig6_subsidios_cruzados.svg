<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Ecossistema terrestre -->
<rect x="30" y="40" width="230" height="200" rx="8" fill="#27500A" opacity="0.80"/>
<text class="th" x="145" y="68" text-anchor="middle" fill="#C0DD97">Ecossistema Terrestre</text>
<text class="ts" x="145" y="90" text-anchor="middle" fill="#97C459">Floresta / Mata Ciliar</text>
<text class="ts" x="145" y="112" text-anchor="middle" fill="#97C459">▸ Queda de folhas e gravetos</text>
<text class="ts" x="145" y="130" text-anchor="middle" fill="#97C459">▸ Insetos terrestres</text>
<text class="ts" x="145" y="148" text-anchor="middle" fill="#97C459">▸ Sombreamento (temp. água)</text>
<text class="ts" x="145" y="166" text-anchor="middle" fill="#97C459">▸ Raízes estabilizam margens</text>
<text class="ts" x="145" y="184" text-anchor="middle" fill="#97C459">▸ Nutrientes via escorrimento</text>

<!-- Setas de subsídio terrestre → aquático -->
<path d="M262 110 L358 110" fill="none" stroke="#EF9F27" stroke-width="3" marker-end="url(#arrow)"/>
<text class="ts" x="310" y="102" text-anchor="middle" fill="#BA7517">liteira, insetos</text>
<path d="M262 155 L358 155" fill="none" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="310" y="148" text-anchor="middle" fill="#185FA5">N, P dissolvidos</text>
<path d="M262 185 L358 185" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text class="ts" x="310" y="180" text-anchor="middle" fill="#5F5E5A">sombra, estabilidade</text>

<!-- Setas de subsídio aquático → terrestre -->
<path d="M358 125 L262 125" fill="none" stroke="#0F6E56" stroke-width="2.5" marker-end="url(#arrow)"/>
<text class="ts" x="310" y="122" text-anchor="middle" fill="#0F6E56">peixes (predadores)</text>
<path d="M358 170 L262 170" fill="none" stroke="#0F6E56" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="310" y="167" text-anchor="middle" fill="#0F6E56">emergens. de insetos</text>

<!-- Ecossistema aquático -->
<rect x="360" y="40" width="280" height="200" rx="8" fill="#185FA5" opacity="0.72"/>
<text class="th" x="500" y="68" text-anchor="middle" fill="white">Ecossistema Aquático</text>
<text class="ts" x="500" y="90" text-anchor="middle" fill="#E6F1FB">Rio / Lagoa</text>
<text class="ts" x="500" y="112" text-anchor="middle" fill="#E6F1FB">▸ Algas e macrófitas aquáticas</text>
<text class="ts" x="500" y="130" text-anchor="middle" fill="#E6F1FB">▸ Invertebrados detritívoros</text>
<text class="ts" x="500" y="148" text-anchor="middle" fill="#E6F1FB">▸ Peixes (subsidio a aves)</text>
<text class="ts" x="500" y="166" text-anchor="middle" fill="#E6F1FB">▸ Carbono dissolvido exportado</text>
<text class="ts" x="500" y="184" text-anchor="middle" fill="#E6F1FB">▸ Insetos emergentes (subsidio)</text>

<!-- Caso clássico: salmão do Pacífico -->
<rect x="30" y="255" width="610" height="44" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text class="th" x="335" y="273" text-anchor="middle" fill="#633806">Caso clássico: Salmão do Pacífico</text>
<text class="ts" x="335" y="290" text-anchor="middle">Salmões em desova transportam N e P marinhos para florestas ripárias — ursos e aves dispersam carcaças &gt;100 m terra adentro</text>

<text class="ts" x="340" y="310" text-anchor="middle">Figura 6 — Subsídios de recursos cruzando fronteiras: fluxos bidirecionais entre ecossistemas terrestres e aquáticos</text>
</svg>
