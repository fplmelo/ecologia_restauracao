<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:14px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:12px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Eixos -->
<line x1="110" y1="460" x2="110" y2="30" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="30" y="252" text-anchor="middle" transform="rotate(-90 30 252)">Conectividade funcional</text>
<text class="ts" x="92" y="65" text-anchor="end">alta</text>
<text class="ts" x="92" y="455" text-anchor="end">baixa</text>
<line x1="110" y1="460" x2="660" y2="460" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="th" x="390" y="505" text-anchor="middle">Conectividade estrutural</text>
<text class="ts" x="120" y="478" text-anchor="start">baixa</text>
<text class="ts" x="640" y="478" text-anchor="end">alta</text>
<line x1="110" y1="245" x2="650" y2="245" stroke="#c8c6be" stroke-width="0.8" stroke-dasharray="6,3"/>
<line x1="385" y1="30" x2="385" y2="460" stroke="#c8c6be" stroke-width="0.8" stroke-dasharray="6,3"/>

<!-- Q2: alta funcional, baixa estrutural -->
<rect x="120" y="40" width="250" height="195" rx="10" fill="#f5f4f0" stroke="#c8c6be" stroke-width="0.8"/>
<rect x="135" y="58" width="60" height="75" rx="5" fill="#3B6D11" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="165" y="100" text-anchor="middle">A</text>
<rect x="288" y="58" width="60" height="75" rx="5" fill="#3B6D11" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="318" y="100" text-anchor="middle">B</text>
<rect x="197" y="68" width="89" height="55" rx="2" fill="#C0DD97" opacity="0.25"/>
<text class="ts" x="242" y="86" text-anchor="middle" fill="#27500A">pasto baixo</text>
<path d="M197 92 Q220 80 242 88 Q265 96 288 88" fill="none" stroke="#EF9F27" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
