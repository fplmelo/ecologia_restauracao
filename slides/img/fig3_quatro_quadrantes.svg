<text class="ts" x="245" y="178" text-anchor="middle">Alta conectividade</text>
<text class="ts" x="245" y="196" text-anchor="middle" fill="#27500A">Ex: frugívoro, matriz permeável</text>
<text class="ts" x="245" y="214" text-anchor="middle">Fragmentos isolados, espécie cruza</text>

<!-- Q1: alta funcional, alta estrutural (ideal) -->
<rect x="395" y="40" width="250" height="195" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="1.2"/>
<rect x="408" y="58" width="55" height="75" rx="5" fill="#3B6D11" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="436" y="100" text-anchor="middle">A</text>
<rect x="465" y="80" width="65" height="30" rx="4" fill="#3B6D11" opacity="0.65"/>
<rect x="532" y="58" width="55" height="75" rx="5" fill="#3B6D11" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="560" y="100" text-anchor="middle">B</text>
<path d="M465 95 L530 95" fill="none" stroke="#EF9F27" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="th" x="520" y="160" text-anchor="middle">Alta conectividade</text>
<text class="ts" x="520" y="178" text-anchor="middle">Alta conectividade</text>
<text class="ts" x="520" y="196" text-anchor="middle" fill="#27500A">Cenário ideal — meta da restauração</text>
<text class="ts" x="520" y="214" text-anchor="middle">Corredor funciona para a espécie-alvo</text>
<text font-size="20" font-family="sans-serif" x="636" y="62" text-anchor="middle">★</text>

<!-- Q3: baixa funcional, baixa estrutural -->
<rect x="120" y="255" width="250" height="195" rx="10" fill="#f5f4f0" stroke="#c8c6be" stroke-width="0.8"/>
<rect x="135" y="272" width="55" height="75" rx="5" fill="#3B6D11" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="163" y="314" text-anchor="middle">A</text>
<rect x="290" y="272" width="55" height="75" rx="5" fill="#3B6D11" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="318" y="314" text-anchor="middle">B</text>
<rect x="193" y="282" width="95" height="55" rx="1" fill="#888780" opacity="0.35"/>
<line x1="193" y1="305" x2="288" y2="305" stroke="#444441" stroke-width="3"/>
<text class="ts" x="242" y="299" text-anchor="middle" fill="#444441">rodovia</text>
<text font-size="18" font-family="sans-serif" x="242" y="328" text-anchor="middle" fill="#A32D2D">✕</text>
<text class="th" x="245" y="375" text-anchor="middle">Baixa conectividade</text>
<text class="ts" x="245" y="393" text-anchor="middle">Baixa conectividade</text>
<text class="ts" x="245" y="411" text-anchor="middle" fill="#A32D2D">Ex: especialista, matriz hostil</text>
<text class="ts" x="245" y="430" text-anchor="middle">Isolamento real — risco de extinção</text>

<!-- Q4: baixa funcional, alta estrutural -->
<rect x="395" y="255" width="250" height="195" rx="10" fill="#f5f4f0" stroke="#c8c6be" stroke-width="0.8"/>
<rect x="408" y="272" width="50" height="75" rx="5" fill="#3B6D11" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="433" y="314" text-anchor="middle">A</text>
<rect x="460" y="295" width="70" height="30" rx="3" fill="#3B6D11" opacity="0.55"/>
<line x1="460" y1="312" x2="530" y2="312" stroke="#444441" stroke-width="2.5"/>
<text class="ts" x="495" y="285" text-anchor="middle">corredor estreito</text>
<rect x="532" y="272" width="50" height="75" rx="5" fill="#3B6D11" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="557" y="314" text-anchor="middle">B</text>
<path d="M460 302 L510 302" fill="none" stroke="#EF9F27" stroke-width="2" stroke-dasharray="5,3"/>
<text font-size="16" font-family="sans-serif" x="518" y="308" text-anchor="middle" fill="#A32D2D">✕</text>
<text class="th" x="520" y="375" text-anchor="middle">Alta conectividade</text>
<text class="ts" x="520" y="393" text-anchor="middle">Baixa conectividade</text>
<text class="ts" x="520" y="411" text-anchor="middle" fill="#A32D2D">Ex: corredor com estrada interna</text>
<text class="ts" x="520" y="430" text-anchor="middle">Conectado no mapa, bloqueado na ecologia</text>

<!-- Seta diagonal restauração -->
<line x1="378" y1="448" x2="400" y2="248" stroke="#0F6E56" stroke-width="1.8" stroke-dasharray="7,4" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="380" text-anchor="end" fill="#0F6E56">meta da</text>
<text class="ts" x="352" y="396" text-anchor="end" fill="#0F6E56">restauração</text>

<text class="ts" x="340" y="490" text-anchor="middle">Figura 3 — Quatro combinações possíveis de conectividade estrutural e conectividade funcional</text>
</svg>
