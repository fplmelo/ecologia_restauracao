<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<text class="th" x="340" y="20" text-anchor="middle">Três modos de ver (e construir) a paisagem</text>

<!-- A mesma cena de caatinga desenhada 3 vezes com diferentes "lentes" -->
<!-- CENA BASE: retângulo estilizado de Caatinga fragmentada (fundo comum) -->

<!-- Visão 1: Ecologia de Paisagens (científica) -->
<rect x="20" y="34" width="195" height="195" rx="8" fill="#F5E9C8" stroke="#8a8880" stroke-width="1"/>
<!-- Fragmentos como manchas verdes -->
<ellipse cx="75"  cy="100" rx="38" ry="42" fill="#27500A" opacity="0.82"/>
<ellipse cx="155" cy="85"  rx="28" ry="32" fill="#27500A" opacity="0.75"/>
<ellipse cx="150" cy="160" rx="32" ry="28" fill="#27500A" opacity="0.78"/>
<ellipse cx="60"  cy="178" rx="18" ry="18" fill="#27500A" opacity="0.68"/>
<!-- Régua de métrica -->
<line x1="30" y1="215" x2="205" y2="215" stroke="#185FA5" stroke-width="1.5"/>
<text class="ts" x="118" y="212" text-anchor="middle" fill="#185FA5">ED = 34.5 m/ha · NP = 4</text>
<text class="th" x="118" y="244" text-anchor="middle">Visão Ecológica</text>
<text class="ts" x="118" y="260" text-anchor="middle">fragmentação · métricas</text>
<text class="ts" x="118" y="274" text-anchor="middle">conectividade · NPP</text>

<!-- Visão 2: Comunidade local / saber tradicional -->
<rect x="243" y="34" width="195" height="195" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<!-- Mesma cena mas com nomes e usos -->
<ellipse cx="298" cy="100" rx="38" ry="42" fill="#27500A" opacity="0.82"/>
<ellipse cx="378" cy="85"  rx="28" ry="32" fill="#27500A" opacity="0.75"/>
<ellipse cx="373" cy="160" rx="32" ry="28" fill="#27500A" opacity="0.78"/>
<ellipse cx="283" cy="178" rx="18" ry="18" fill="#27500A" opacity="0.68"/>
<!-- Rótulos de uso e nome -->
<text style="font-size:9px;fill:#C0DD97;font-weight:600" x="298" y="100" text-anchor="middle">Mata</text>
<text style="font-size:9px;fill:#C0DD97" x="298" y="112" text-anchor="middle">do João</text>
<text style="font-size:9px;fill:#C0DD97;font-weight:600" x="378" y="87" text-anchor="middle">Aroeira</text>
<text style="font-size:9px;fill:#C0DD97" x="373" y="162" text-anchor="middle">Roça</text>
<!-- ícones de uso: casa e poço -->
<rect x="246" y="148" width="18" height="14" rx="2" fill="#BA7517" opacity="0.8"/>
<circle cx="428" cy="148" r="6" fill="#185FA5" opacity="0.7"/>
<text class="th" x="340" y="244" text-anchor="middle">Visão Territorial</text>
<text class="ts" x="340" y="260" text-anchor="middle">nomes · usos · memória</text>
<text class="ts" x="340" y="274" text-anchor="middle">identidade · pertencimento</text>

<!-- Visão 3: Capital/Agronegócio -->
<rect x="466" y="34" width="194" height="195" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<!-- Mesma cena mas com vetores de conversão -->
<ellipse cx="521" cy="100" rx="38" ry="42" fill="#27500A" opacity="0.5" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="4,3"/>
<ellipse cx="601" cy="85"  rx="28" ry="32" fill="#27500A" opacity="0.5" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="4,3"/>
<ellipse cx="596" cy="160" rx="32" ry="28" fill="#27500A" opacity="0.5" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="4,3"/>
<ellipse cx="506" cy="178" rx="18" ry="18" fill="#27500A" opacity="0.5" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="4,3"/>
<!-- Marcas de "a converter" -->
<text style="font-size:18px;fill:#A32D2D;font-weight:700" x="521" y="106" text-anchor="middle">$</text>
<text style="font-size:18px;fill:#A32D2D;font-weight:700" x="601" y="91" text-anchor="middle">$</text>
<text style="font-size:18px;fill:#A32D2D;font-weight:700" x="596" y="166" text-anchor="middle">$</text>
<!-- Trator (retângulo) -->
<rect x="530" y="148" width="40" height="22" rx="3" fill="#BA7517" opacity="0.9"/>
<text style="font-size:9px;fill:white;font-weight:600" x="550" y="163" text-anchor="middle">desmate</text>
<text class="th" x="563" y="244" text-anchor="middle">Visão do Capital</text>
<text class="ts" x="563" y="260" text-anchor="middle">recurso · produto</text>
<text class="ts" x="563" y="274" text-anchor="middle">commoditização · lucro</text>

<!-- Seta central: conflito entre visões -->
<line x1="216" y1="132" x2="243" y2="132" stroke="#2c2c2a" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<line x1="438" y1="132" x2="466" y2="132" stroke="#2c2c2a" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

<text class="ts" x="340" y="296" text-anchor="middle">Figura 4 — A mesma paisagem, três construções sociais distintas: "Paisagem não é meramente o mundo que vemos — é uma construção" (Cosgrove 1998)</text>
</svg>
