<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Bacia: forma de V estilizada -->
<!-- Encostas florestadas -->
<polygon points="40,280 200,60 360,280" fill="#27500A" opacity="0.75"/>
<polygon points="320,280 480,60 640,280" fill="#27500A" opacity="0.68"/>
<!-- Calha do rio -->
<polygon points="180,280 340,175 500,280" fill="#185FA5" opacity="0.55"/>
<!-- Linha de divisor de águas (cume) -->
<line x1="200" y1="60" x2="480" y2="60" stroke="#1a1a18" stroke-width="1.5" stroke-dasharray="6,3"/>
<text class="ts" x="340" y="50" text-anchor="middle" fill="#1a1a18">divisor de águas (watershed boundary)</text>

<!-- Rótulos internos -->
<text class="th" x="130" y="175" text-anchor="middle" fill="#C0DD97">Encosta</text>
<text class="ts" x="130" y="192" text-anchor="middle" fill="#97C459">floresta</text>
<text class="th" x="550" y="175" text-anchor="middle" fill="#C0DD97">Encosta</text>
<text class="ts" x="550" y="192" text-anchor="middle" fill="#97C459">floresta</text>
<text class="th" x="340" y="240" text-anchor="middle" fill="white">Rio</text>

<!-- ENTRADAS: precipitação e deposição -->
<line x1="100" y1="22" x2="100" y2="58" stroke="#378ADD" stroke-width="2.5" marker-end="url(#arrow)"/>
<text class="ts" x="60" y="18" fill="#185FA5">Entradas</text>
<text class="ts" x="60" y="32" fill="#185FA5">precipitação</text>
<text class="ts" x="60" y="46" fill="#185FA5">+ deposição atm.</text>

<!-- SAÍDAS: exportação fluvial -->
<line x1="340" y1="282" x2="340" y2="316" stroke="#185FA5" stroke-width="3" marker-end="url(#arrow)"/>
<text class="ts" x="380" y="295" fill="#185FA5">Saídas</text>
<text class="ts" x="380" y="309" fill="#185FA5">exportação fluvial</text>

<!-- Balanço = Entradas - Saídas -->
<rect x="30" y="295" width="190" height="38" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text class="th" x="125" y="313" text-anchor="middle" fill="#173404">Balanço = Entradas – Saídas</text>
<text class="ts" x="125" y="328" text-anchor="middle" fill="#27500A">retenção líquida de nutrientes</text>

<!-- Setas de escoamento superficial nas encostas -->
<path d="M120 150 Q180 200 230 258" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<path d="M550 150 Q490 200 450 258" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

<!-- Setas de evapotranspiração -->
<line x1="165" y1="125" x2="165" y2="88" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text class="ts" x="110" y="82" fill="#BA7517">ET</text>
<line x1="505" y1="125" x2="505" y2="88" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text class="ts" x="518" y="82" fill="#BA7517">ET</text>

<!-- Experimento Hubbard Brook: desflorestamento -->
<rect x="430" y="270" width="235" height="55" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text class="th" x="547" y="290" text-anchor="middle" fill="#A32D2D">Hubbard Brook (Likens et al. 1970)</text>
<text class="ts" x="547" y="306" text-anchor="middle">Desflorestamento: NO₃⁻ aumentou</text>
<text class="ts" x="547" y="320" text-anchor="middle">40× na saída fluvial</text>

<text class="ts" x="340" y="340" text-anchor="middle">Figura 3 — Abordagem de bacia hidrográfica: balanço entre entradas e saídas como método para quantificar fluxos em paisagens</text>
</svg>
