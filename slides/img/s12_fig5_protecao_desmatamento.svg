<svg width="100%" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<text class="th" x="340" y="20" text-anchor="middle">Proteção territorial e desmatamento: quem protege mais a floresta?</text>

<!-- Eixo Y (desmatamento) -->
<line x1="80" y1="220" x2="80" y2="40" stroke="#1a1a18" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="40" y="135" text-anchor="middle" transform="rotate(-90 40 135)">% área desmatada</text>
<text class="ts" x="72" y="44" text-anchor="end">alto</text>
<text class="ts" x="72" y="220" text-anchor="end">baixo</text>

<!-- Eixo X -->
<line x1="80" y1="220" x2="650" y2="220" stroke="#1a1a18" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Barras comparativas -->
<!-- Terras Indígenas homologadas -->
<rect x="100" y="196" width="80" height="24" rx="3" fill="#27500A" opacity="0.88"/>
<text class="ts" x="140" y="190" text-anchor="middle" fill="#27500A">1–3%</text>
<text class="ts" x="140" y="248" text-anchor="middle">TI</text>
<text class="ts" x="140" y="260" text-anchor="middle">homologada</text>

<!-- UCs de proteção integral -->
<rect x="210" y="178" width="80" height="42" rx="3" fill="#185FA5" opacity="0.82"/>
<text class="ts" x="250" y="172" text-anchor="middle" fill="#185FA5">5–8%</text>
<text class="ts" x="250" y="248" text-anchor="middle">UC proteção</text>
<text class="ts" x="250" y="260" text-anchor="middle">integral</text>

<!-- UCs de uso sustentável -->
<rect x="320" y="155" width="80" height="65" rx="3" fill="#378ADD" opacity="0.75"/>
<text class="ts" x="360" y="149" text-anchor="middle" fill="#185FA5">10–15%</text>
<text class="ts" x="360" y="248" text-anchor="middle">UC uso</text>
<text class="ts" x="360" y="260" text-anchor="middle">sustentável</text>

<!-- Terras privadas com reserva legal -->
<rect x="430" y="115" width="80" height="105" rx="3" fill="#BA7517" opacity="0.75"/>
<text class="ts" x="470" y="109" text-anchor="middle" fill="#BA7517">25–35%</text>
<text class="ts" x="470" y="248" text-anchor="middle">Reserva</text>
<text class="ts" x="470" y="260" text-anchor="middle">legal privada</text>

<!-- Área sem proteção -->
<rect x="540" y="58" width="80" height="162" rx="3" fill="#A32D2D" opacity="0.75"/>
<text class="ts" x="580" y="52" text-anchor="middle" fill="#A32D2D">40–60%</text>
<text class="ts" x="580" y="248" text-anchor="middle">Sem</text>
<text class="ts" x="580" y="260" text-anchor="middle">proteção</text>

<!-- Anotação: paradoxo político -->
<rect x="82" y="36" width="200" height="36" rx="5" fill="#EAF3DE" stroke="#639922" stroke-width="0.8"/>
<text style="font-size:10px;font-weight:600;fill:#173404" x="182" y="52" text-anchor="middle">Menor desmatamento onde há</text>
<text style="font-size:10px;fill:#173404" x="182" y="66" text-anchor="middle">maior pressão sobre os povos</text>

<!-- Seta apontando para TI -->
<line x1="175" y1="72" x2="148" y2="194" stroke="#639922" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

<text class="ts" x="340" y="278" text-anchor="middle">Figura 5 — Eficácia comparada de diferentes formas de proteção territorial sobre o desmatamento (TNC Brasil 2022; CPT 2025)</text>
</svg>
