<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:14px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:12px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Fundo de paisagem -->
<rect x="20" y="30" width="640" height="350" rx="8" fill="#F5E9C8" opacity="0.5"/>

<!-- Fragmentos de Mata Atlântica -->
<ellipse cx="120" cy="155" rx="75" ry="90" fill="#27500A" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="120" y="152" text-anchor="middle">Poço</text>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="120" y="168" text-anchor="middle">das Antas</text>

<ellipse cx="290" cy="120" rx="55" ry="65" fill="#27500A" opacity="0.8"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="290" y="125" text-anchor="middle">Frag. 2</text>

<ellipse cx="420" cy="100" rx="38" ry="45" fill="#27500A" opacity="0.75"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="420" y="105" text-anchor="middle">Frag. 3</text>

<ellipse cx="540" cy="165" rx="80" ry="80" fill="#27500A" opacity="0.85"/>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="540" y="162" text-anchor="middle">Fazenda</text>
<text font-size="12" font-family="sans-serif" fill="#C0DD97" x="540" y="178" text-anchor="middle">União</text>

<!-- Stepping stones -->
<ellipse cx="355" cy="210" rx="22" ry="18" fill="#27500A" opacity="0.65"/>
<text font-size="11" font-family="sans-serif" fill="#C0DD97" x="355" y="214" text-anchor="middle">SS</text>

<ellipse cx="475" cy="240" rx="18" ry="15" fill="#27500A" opacity="0.65"/>
<text font-size="11" font-family="sans-serif" fill="#C0DD97" x="475" y="244" text-anchor="middle">SS</text>

<!-- Rodovias -->
<path d="M20 290 Q200 270 380 280 Q500 285 660 265" fill="none" stroke="#444441" stroke-width="8" opacity="0.8"/>
<path d="M20 290 Q200 270 380 280 Q500 285 660 265" fill="none" stroke="#F8F0D0" stroke-width="2" stroke-dasharray="18,12" opacity="0.9"/>
<text class="th" x="200" y="268" text-anchor="middle" fill="#2C2C2A">BR-101</text>

<path d="M345 30 Q350 150 352 280" fill="none" stroke="#888780" stroke-width="4" opacity="0.7"/>
<text class="ts" x="365" y="55" fill="#2c2c2a">RJ-162</text>

<!-- Rotas funcionais acima da rodovia -->
<path d="M198 130 Q240 100 240 110" fill="none" stroke="#EF9F27" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
<path d="M345 110 Q375 100 385 100" fill="none" stroke="#EF9F27" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
<path d="M460 115 Q490 130 462 155" fill="none" stroke="#EF9F27" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

<!-- Bloqueios pela rodovia -->
<path d="M290 190 Q310 240 320 265" fill="none" stroke="#A32D2D" stroke-width="2" stroke-dasharray="4,3"/>
<text font-size="18" font-family="sans-serif" x="316" y="268" text-anchor="middle" fill="#A32D2D">✕</text>

<path d="M480 210 Q500 255 510 262" fill="none" stroke="#A32D2D" stroke-width="2" stroke-dasharray="4,3"/>
<text font-size="18" font-family="sans-serif" x="515" y="268" text-anchor="middle" fill="#A32D2D">✕</text>

<!-- Anotações -->
<line x1="355" y1="120" x2="355" y2="60" stroke="#c8c6be" stroke-width="0.5" stroke-dasharray="3,3"/>
<text class="ts" x="355" y="52" text-anchor="middle">conectividade estrutural presente</text>
<text class="ts" x="90" y="312" text-anchor="middle" fill="#A32D2D">barreira funcional</text>
<line x1="140" y1="305" x2="200" y2="290" stroke="#A32D2D" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- Legenda -->
<rect x="28" y="318" width="14" height="14" rx="2" fill="#27500A"/>
<text class="ts" x="48" y="330">Fragmento de MA</text>
<rect x="155" y="318" width="14" height="14" rx="2" fill="#27500A" opacity="0.6"/>
<text class="ts" x="175" y="330">Stepping stone</text>
<line x1="290" y1="325" x2="318" y2="325" stroke="#EF9F27" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="325" y="330">Rota funcional possível</text>
<line x1="470" y1="325" x2="490" y2="325" stroke="#A32D2D" stroke-width="2" stroke-dasharray="4,3"/>
<text font-size="14" font-family="sans-serif" x="497" y="330" fill="#A32D2D">✕</text>
<text class="ts" x="507" y="330">Barreira: rodovia</text>

<text class="ts" x="340" y="390" text-anchor="middle">Figura 4 — Mico-leão-dourado (RJ): rodovias como barreiras funcionais apesar da conectividade estrutural</text>
</svg>
