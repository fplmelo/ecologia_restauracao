<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:14px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:12px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Fundos dos quadrantes -->
<rect x="100" y="50" width="270" height="230" rx="0" fill="#FCEBEB" opacity="0.55"/>
<rect x="370" y="50" width="270" height="230" rx="0" fill="#EAF3DE" opacity="0.55"/>
<rect x="100" y="50" width="270" height="115" rx="0" fill="#FAEEDA" opacity="0.45"/>
<rect x="370" y="165" width="270" height="115" rx="0" fill="#FAEEDA" opacity="0.45"/>
<rect x="100" y="50" width="540" height="350" rx="6" fill="none" stroke="#c8c6be" stroke-width="1"/>

<!-- Eixo Y -->
<line x1="100" y1="460" x2="100" y2="25" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="20" y="252" text-anchor="middle" transform="rotate(-90 20 252)">Conectividade funcional</text>
<text class="ts" x="88" y="65" text-anchor="end">alta</text>
<text class="ts" x="88" y="392" text-anchor="end">baixa</text>

<!-- Eixo X -->
<line x1="100" y1="400" x2="660" y2="400" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="th" x="380" y="445" text-anchor="middle">Conectividade estrutural</text>
<text class="ts" x="115" y="420" text-anchor="start">baixa</text>
<text class="ts" x="630" y="420" text-anchor="end">alta</text>

<!-- Linhas divisórias -->
<line x1="100" y1="222" x2="640" y2="222" stroke="#c8c6be" stroke-width="0.6" stroke-dasharray="5,4"/>
<line x1="370" y1="50" x2="370" y2="400" stroke="#c8c6be" stroke-width="0.6" stroke-dasharray="5,4"/>

<!-- Pontos de cenários -->
<circle cx="185" cy="200" r="10" fill="#BA7517" opacity="0.85"/>
<text class="ts" x="200" y="190" fill="#3a3a38">Limiar de</text>
<text class="ts" x="200" y="205" fill="#3a3a38">percolação</text>

<circle cx="170" cy="355" r="10" fill="#A32D2D" opacity="0.85"/>
<text class="ts" x="187" y="348" fill="#3a3a38">Caatinga / mamíferos</text>
<text class="ts" x="187" y="363" fill="#3a3a38">grande porte</text>

<circle cx="195" cy="95" r="10" fill="#0F6E56" opacity="0.85"/>
<text class="ts" x="212" y="88" fill="#3a3a38">Mata Atlântica /</text>
<text class="ts" x="212" y="103" fill="#3a3a38">aves frugívoras</text>

<circle cx="520" cy="340" r="10" fill="#993C1D" opacity="0.85"/>
<text class="ts" x="535" y="333" fill="#3a3a38">Mico-leão / BR-101</text>
<text class="ts" x="535" y="348" fill="#3a3a38">(sem passagem fauna)</text>

<circle cx="570" cy="100" r="12" fill="#0F6E56" opacity="0.9"/>
<text class="ts" x="590" y="95" fill="#0F6E56">Mico-leão /</text>
<text class="ts" x="590" y="110" fill="#0F6E56">com passagem fauna ★</text>

<circle cx="490" cy="370" r="9" fill="#D85A30" opacity="0.8"/>
<text class="ts" x="505" y="375" fill="#3a3a38">Corredor estreito/estrada</text>

<!-- Seta de restauração -->
<path d="M195 360 Q300 280 420 200 Q490 155 555 110" fill="none" stroke="#0F6E56" stroke-width="3" stroke-dasharray="10,5" marker-end="url(#arrow-green)"/>

<!-- Rótulo da seta -->
<rect x="260" y="270" width="150" height="38" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
<text class="th" x="335" y="286" text-anchor="middle" fill="#27500A">meta da restauração</text>
<text class="ts" x="335" y="302" text-anchor="middle" fill="#3B6D11">+ permeabilidade da matriz</text>

<!-- Rótulos dos quadrantes -->
<text class="ts" x="235" y="150" text-anchor="middle" fill="#BA7517">dispersão funcional</text>
<text class="ts" x="235" y="166" text-anchor="middle" fill="#BA7517">sem estrutura</text>
<text class="ts" x="500" y="150" text-anchor="middle" fill="#27500A">cenário ideal</text>
<text class="ts" x="500" y="166" text-anchor="middle" fill="#27500A">conservação efetiva</text>
<text class="ts" x="235" y="340" text-anchor="middle" fill="#A32D2D">isolamento real</text>
<text class="ts" x="235" y="356" text-anchor="middle" fill="#A32D2D">risco de extinção local</text>
<text class="ts" x="500" y="340" text-anchor="middle" fill="#993C1D">conectado no mapa</text>
<text class="ts" x="500" y="356" text-anchor="middle" fill="#993C1D">isolado na ecologia</text>

<!-- Legenda -->
<circle cx="118" cy="468" r="7" fill="#0F6E56" opacity="0.9"/>
<text class="ts" x="130" y="473">Alta conectividade</text>
<circle cx="270" cy="468" r="7" fill="#A32D2D" opacity="0.85"/>
<text class="ts" x="282" y="473">Baixa conectividade</text>
<circle cx="420" cy="468" r="7" fill="#BA7517" opacity="0.85"/>
<text class="ts" x="432" y="473">Zona crítica / limiar</text>

<text class="ts" x="340" y="494" text-anchor="middle">Figura 5 — Espaço conceitual síntese: cenários reais no gradiente conectividade × conectividade</text>
</svg>
