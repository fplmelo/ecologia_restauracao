<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Painel esq: problema de correlação entre métricas -->
<text class="th" x="190" y="22" text-anchor="middle">Grupos de métricas correlacionadas</text>

<!-- Grupo 1: Área/borda -->
<ellipse cx="110" cy="100" rx="85" ry="55" fill="#EAF3DE" stroke="#639922" stroke-width="1.2"/>
<text class="th" x="110" y="72" text-anchor="middle" fill="#173404">Área / Borda</text>
<text class="ts" x="110" y="90"  text-anchor="middle">CA, TA, PLAND</text>
<text class="ts" x="110" y="106" text-anchor="middle">NP, PD</text>
<text class="ts" x="110" y="122" text-anchor="middle">TE, ED</text>

<!-- Grupo 2: Forma -->
<ellipse cx="280" cy="100" rx="75" ry="55" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text class="th" x="280" y="72" text-anchor="middle" fill="#0C447C">Forma</text>
<text class="ts" x="280" y="90"  text-anchor="middle">SHAPE, FRAC</text>
<text class="ts" x="280" y="106" text-anchor="middle">PARA, CONTIG</text>
<text class="ts" x="280" y="122" text-anchor="middle">CIRCLE</text>

<!-- Grupo 3: Agregação -->
<ellipse cx="110" cy="215" rx="85" ry="55" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2"/>
<text class="th" x="110" y="186" text-anchor="middle" fill="#633806">Agregação</text>
<text class="ts" x="110" y="204" text-anchor="middle">AI, CLUMPY</text>
<text class="ts" x="110" y="220" text-anchor="middle">PLADJ, IJI</text>
<text class="ts" x="110" y="236" text-anchor="middle">CONTAG</text>

<!-- Grupo 4: Isolamento -->
<ellipse cx="280" cy="215" rx="75" ry="55" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.2"/>
<text class="th" x="280" y="186" text-anchor="middle" fill="#791F1F">Isolamento</text>
<text class="ts" x="280" y="204" text-anchor="middle">ENN, PROX</text>
<text class="ts" x="280" y="220" text-anchor="middle">CONNECT</text>
<text class="ts" x="280" y="236" text-anchor="middle">COHESION</text>

<!-- Sobreposição: diversidade (aplica-se a landscape) -->
<ellipse cx="195" cy="158" rx="40" ry="30" fill="#F0E6FB" stroke="#534AB7" stroke-width="1.2"/>
<text class="th" x="195" y="152" text-anchor="middle" fill="#3C3489">Diversidade</text>
<text class="ts" x="195" y="168" text-anchor="middle" fill="#3C3489">SHDI SHEI</text>

<!-- Setas mostrando correlação dentro do grupo -->
<text class="ts" x="55" y="152" text-anchor="middle" fill="#639922">r ≈ 0.85</text>
<text class="ts" x="55" y="165" text-anchor="middle" fill="#A32D2D">alta redund.</text>

<!-- Painel dir: matriz de correlação estilizada -->
<text class="th" x="510" y="22" text-anchor="middle">Por que a redundância é um problema?</text>

<rect x="370" y="35" width="290" height="240" rx="8" fill="#f5f4f0" stroke="#c8c6be" stroke-width="1"/>

<!-- Problema 1 -->
<rect x="386" y="52" width="8" height="8" rx="1" fill="#A32D2D"/>
<text class="ts" x="402" y="62">Usar 20+ métricas correlacionadas</text>
<text class="ts" x="402" y="76">não adiciona informação nova</text>

<!-- Problema 2 -->
<rect x="386" y="94" width="8" height="8" rx="1" fill="#A32D2D"/>
<text class="ts" x="402" y="104">Dificulta interpretação e comunicação</text>
<text class="ts" x="402" y="118">dos resultados</text>

<!-- Problema 3 -->
<rect x="386" y="136" width="8" height="8" rx="1" fill="#A32D2D"/>
<text class="ts" x="402" y="146">Infla a significância estatística</text>
<text class="ts" x="402" y="160">em análises multivariadas</text>

<!-- Solução -->
<rect x="380" y="182" width="272" height="76" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text class="th" x="516" y="200" text-anchor="middle" fill="#173404">Solução: conjunto mínimo</text>
<text class="ts" x="390" y="220">Cushman et al. (2008): selecionar 5–8 métricas</text>
<text class="ts" x="390" y="236">ortogonais (não correlacionadas) que</text>
<text class="ts" x="390" y="250">cubram composição E configuração</text>

<text class="ts" x="340" y="280" text-anchor="middle">Figura 5 — Grupos de métricas correlacionadas e o problema da redundância (Cushman et al. 2008)</text>
</svg>
