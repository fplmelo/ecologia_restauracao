<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Nível 1: Patch -->
<rect x="20" y="20" width="190" height="280" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text class="th" x="115" y="44" text-anchor="middle" fill="#0C447C">Nível PATCH</text>
<text class="ts" x="115" y="62" text-anchor="middle">uma métrica por patch</text>

<!-- Paisagem mini com patches numerados -->
<rect x="40" y="72" width="150" height="100" rx="4" fill="#F5E9C8"/>
<!-- patch 1 -->
<rect x="48"  y="80"  width="40" height="35" rx="3" fill="#27500A" opacity="0.85"/>
<text style="font-size:10px;font-weight:600;fill:#C0DD97" x="68"  y="102" text-anchor="middle">P1</text>
<!-- patch 2 -->
<rect x="100" y="80"  width="30" height="30" rx="3" fill="#27500A" opacity="0.78"/>
<text style="font-size:10px;font-weight:600;fill:#C0DD97" x="115" y="99"  text-anchor="middle">P2</text>
<!-- patch 3 -->
<rect x="142" y="85"  width="42" height="40" rx="3" fill="#27500A" opacity="0.82"/>
<text style="font-size:10px;font-weight:600;fill:#C0DD97" x="163" y="108" text-anchor="middle">P3</text>
<!-- patch 4 -->
<rect x="48"  y="128" width="55" height="38" rx="3" fill="#27500A" opacity="0.80"/>
<text style="font-size:10px;font-weight:600;fill:#C0DD97" x="75"  y="151" text-anchor="middle">P4</text>
<!-- patch 5 -->
<rect x="118" y="130" width="66" height="36" rx="3" fill="#27500A" opacity="0.76"/>
<text style="font-size:10px;font-weight:600;fill:#C0DD97" x="151" y="152" text-anchor="middle">P5</text>

<!-- Tabela de valores por patch -->
<rect x="38" y="182" width="154" height="98" rx="4" fill="white" stroke="#185FA5" stroke-width="0.7"/>
<text style="font-size:10px;font-weight:600;fill:#0C447C" x="46"  y="196">Patch</text>
<text style="font-size:10px;font-weight:600;fill:#0C447C" x="92"  y="196">AREA (ha)</text>
<text style="font-size:10px;font-weight:600;fill:#0C447C" x="155" y="196" text-anchor="end">ENN (m)</text>
<line x1="38" y1="200" x2="192" y2="200" stroke="#185FA5" stroke-width="0.6"/>
<text class="ts" x="46"  y="214">P1</text><text class="ts" x="92"  y="214">14.0</text><text class="ts" x="155" y="214" text-anchor="end">85</text>
<text class="ts" x="46"  y="228">P2</text><text class="ts" x="92"  y="228">9.0</text> <text class="ts" x="155" y="228" text-anchor="end">52</text>
<text class="ts" x="46"  y="242">P3</text><text class="ts" x="92"  y="242">16.8</text><text class="ts" x="155" y="242" text-anchor="end">47</text>
<text class="ts" x="46"  y="256">P4</text><text class="ts" x="92"  y="256">20.9</text><text class="ts" x="155" y="256" text-anchor="end">38</text>
<text class="ts" x="46"  y="270">P5</text><text class="ts" x="92"  y="270">23.8</text><text class="ts" x="155" y="270" text-anchor="end">38</text>
<text class="ts" x="115" y="288" text-anchor="middle" fill="#185FA5">Unidade: patch individual</text>

<!-- Seta de agregação patch → class -->
<line x1="212" y1="160" x2="238" y2="160" stroke="#1a1a18" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="225" y="152" text-anchor="middle">agrega</text>

<!-- Nível 2: Class -->
<rect x="240" y="20" width="190" height="280" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1.2"/>
<text class="th" x="335" y="44" text-anchor="middle" fill="#173404">Nível CLASS</text>
<text class="ts" x="335" y="62" text-anchor="middle">integrado por tipo de patch</text>

<!-- Visual de classe floresta destacada -->
<rect x="258" y="72" width="152" height="100" rx="4" fill="#F5E9C8"/>
<rect x="264" y="79"  width="40" height="35" rx="3" fill="#27500A" opacity="0.85"/>
<rect x="314" y="79"  width="30" height="30" rx="3" fill="#27500A" opacity="0.78"/>
<rect x="352" y="84"  width="42" height="40" rx="3" fill="#27500A" opacity="0.82"/>
<rect x="264" y="127" width="55" height="38" rx="3" fill="#27500A" opacity="0.80"/>
<rect x="334" y="129" width="66" height="36" rx="3" fill="#27500A" opacity="0.76"/>
<!-- Borda dupla em todos os patches da classe -->
<rect x="260" y="75" width="156" height="100" rx="4" fill="none" stroke="#639922" stroke-width="2.5" stroke-dasharray="5,3"/>
<text class="ts" x="335" y="186" text-anchor="middle" fill="#639922">← todos os patches</text>
<text class="ts" x="335" y="200" text-anchor="middle" fill="#639922">da classe "floresta"</text>

<!-- Tabela de valores por classe -->
<rect x="258" y="210" width="154" height="74" rx="4" fill="white" stroke="#639922" stroke-width="0.7"/>
<text style="font-size:10px;font-weight:600;fill:#173404" x="266" y="226">Classe</text>
<text style="font-size:10px;font-weight:600;fill:#173404" x="330" y="226" text-anchor="middle">CA (ha)</text>
<text style="font-size:10px;font-weight:600;fill:#173404" x="400" y="226" text-anchor="end">NP</text>
<line x1="258" y1="230" x2="412" y2="230" stroke="#639922" stroke-width="0.6"/>
<text class="ts" x="266" y="244">Floresta</text><text class="ts" x="330" y="244" text-anchor="middle">84.5</text><text class="ts" x="400" y="244" text-anchor="end">5</text>
<text class="ts" x="266" y="258">Pasto</text>  <text class="ts" x="330" y="258" text-anchor="middle">45.2</text><text class="ts" x="400" y="258" text-anchor="end">3</text>
<text class="ts" x="266" y="272">Água</text>   <text class="ts" x="330" y="272" text-anchor="middle">12.3</text><text class="ts" x="400" y="272" text-anchor="end">2</text>
<text class="ts" x="335" y="288" text-anchor="middle" fill="#639922">Unidade: tipo de cobertura</text>

<!-- Seta de agregação class → landscape -->
<line x1="432" y1="160" x2="458" y2="160" stroke="#1a1a18" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="445" y="152" text-anchor="middle">integra</text>

<!-- Nível 3: Landscape -->
<rect x="460" y="20" width="200" height="280" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2"/>
<text class="th" x="560" y="44" text-anchor="middle" fill="#633806">Nível LANDSCAPE</text>
<text class="ts" x="560" y="62" text-anchor="middle">toda a paisagem integrada</text>

<!-- Paisagem completa com todas as classes -->
<rect x="476" y="72" width="168" height="110" rx="4" fill="#F5E9C8"/>
<rect x="482" y="79"  width="40" height="35" rx="3" fill="#27500A" opacity="0.85"/>
<rect x="530" y="79"  width="30" height="30" rx="3" fill="#27500A" opacity="0.78"/>
<rect x="569" y="84"  width="42" height="40" rx="3" fill="#27500A" opacity="0.82"/>
<rect x="482" y="127" width="55" height="38" rx="3" fill="#27500A" opacity="0.80"/>
<rect x="548" y="129" width="66" height="36" rx="3" fill="#27500A" opacity="0.76"/>
<!-- Rect de pastagem no fundo -->
<rect x="476" y="72" width="168" height="110" rx="4" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-dasharray="5,3"/>
<text class="ts" x="560" y="196" text-anchor="middle" fill="#BA7517">← paisagem inteira</text>

<!-- Tabela de valores de paisagem -->
<rect x="476" y="210" width="168" height="74" rx="4" fill="white" stroke="#BA7517" stroke-width="0.7"/>
<text style="font-size:10px;font-weight:600;fill:#633806" x="484" y="226">Métrica</text>
<text style="font-size:10px;font-weight:600;fill:#633806" x="638" y="226" text-anchor="end">Valor</text>
<line x1="476" y1="230" x2="644" y2="230" stroke="#BA7517" stroke-width="0.6"/>
<text class="ts" x="484" y="244">SHDI</text>  <text class="ts" x="638" y="244" text-anchor="end">1.06</text>
<text class="ts" x="484" y="258">AI</text>     <text class="ts" x="638" y="258" text-anchor="end">82.1</text>
<text class="ts" x="484" y="272">ED (m/ha)</text><text class="ts" x="638" y="272" text-anchor="end">34.5</text>
<text class="ts" x="560" y="288" text-anchor="middle" fill="#BA7517">Unidade: paisagem toda</text>

<text class="ts" x="340" y="316" text-anchor="middle">Figura 4 — Os três níveis hierárquicos de cálculo de métricas: patch → class → landscape (McGarigal &amp; Marks 1995)</text>
</svg>
