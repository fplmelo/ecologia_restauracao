<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
    .eq { font-size:12px; font-weight:600; fill:#0C447C; font-style:italic; }
  </style>
</defs>

<text class="th" x="340" y="20" text-anchor="middle">Métricas de Configuração — requerem informação espacial</text>

<!-- CARD 1: NP - Número de patches -->
<rect x="20" y="34" width="150" height="160" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text class="th" x="95" y="56" text-anchor="middle" fill="#173404">NP</text>
<text class="ts" x="95" y="72" text-anchor="middle">Número de patches</text>
<text class="eq" x="95" y="96" text-anchor="middle">NP = nᵢ</text>
<text class="ts" x="32" y="116">nᵢ = total de patches</text>
<text class="ts" x="32" y="132">da classe i</text>
<text class="ts" x="32" y="152">NP = 1 → 1 bloco contínuo</text>
<text class="ts" x="32" y="168">NP alto → fragmentação</text>
<!-- Mini visual: 5 patches pequenos -->
<rect x="35" y="112" width="18" height="18" rx="2" fill="#27500A" opacity="0.82"/>
<rect x="60" y="116" width="14" height="14" rx="2" fill="#27500A" opacity="0.75"/>
<rect x="80" y="110" width="20" height="20" rx="2" fill="#27500A" opacity="0.82"/>
<rect x="107" y="118" width="12" height="12" rx="2" fill="#27500A" opacity="0.72"/>
<rect x="127" y="112" width="16" height="16" rx="2" fill="#27500A" opacity="0.78"/>
<text class="ts" x="95" y="180" text-anchor="middle" fill="#639922">NP = 5</text>

<!-- CARD 2: ED - Densidade de borda -->
<rect x="182" y="34" width="150" height="160" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" x="257" y="56" text-anchor="middle" fill="#0C447C">ED</text>
<text class="ts" x="257" y="72" text-anchor="middle">Densidade de borda</text>
<text class="eq" x="257" y="96" text-anchor="middle">ED = E / A (m/ha)</text>
<text class="ts" x="194" y="116">E = comprimento total</text>
<text class="ts" x="194" y="132">de todas as bordas (m)</text>
<text class="ts" x="194" y="148">A = área total da paisagem</text>
<text class="ts" x="194" y="164">ED = 0 → sem borda</text>
<!-- Mini patch com borda destacada -->
<rect x="208" y="112" width="50" height="42" rx="4" fill="#27500A" opacity="0.5"/>
<rect x="208" y="112" width="50" height="42" rx="4" fill="none" stroke="#185FA5" stroke-width="5" opacity="0.8"/>
<text class="ts" x="257" y="180" text-anchor="middle" fill="#185FA5">→ interface entre classes</text>

<!-- CARD 3: AI - Aggregation Index -->
<rect x="344" y="34" width="150" height="160" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text class="th" x="419" y="56" text-anchor="middle" fill="#633806">AI</text>
<text class="ts" x="419" y="72" text-anchor="middle">Índice de Agregação</text>
<text class="eq" x="419" y="96" text-anchor="middle">AI = gᵢᵢ / gᵢᵢ_max × 100</text>
<text class="ts" x="356" y="116">gᵢᵢ = adjacências entre</text>
<text class="ts" x="356" y="132">células da mesma classe</text>
<text class="ts" x="356" y="148">AI = 0: maximamente disperso</text>
<text class="ts" x="356" y="164">AI = 100: totalmente agregado</text>
<!-- Contraste visual: disperso vs. agregado -->
<rect x="358" y="108" width="10" height="10" rx="1" fill="#BA7517" opacity="0.8"/>
<rect x="374" y="115" width="10" height="10" rx="1" fill="#BA7517" opacity="0.8"/>
<rect x="365" y="125" width="10" height="10" rx="1" fill="#BA7517" opacity="0.8"/>
<rect x="380" y="108" width="10" height="10" rx="1" fill="#BA7517" opacity="0.8"/>
<text class="ts" x="380" y="145" fill="#A32D2D">AI baixo</text>
<rect x="408" y="108" width="28" height="28" rx="2" fill="#BA7517" opacity="0.8"/>
<text class="ts" x="422" y="150" fill="#0F6E56">AI alto</text>

<!-- CARD 4: ENN - Distância ao vizinho -->
<rect x="506" y="34" width="154" height="160" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text class="th" x="583" y="56" text-anchor="middle" fill="#791F1F">ENN</text>
<text class="ts" x="583" y="72" text-anchor="middle">Distância ao vizinho</text>
<text class="eq" x="583" y="96" text-anchor="middle">ENN = dᵢⱼ (m)</text>
<text class="ts" x="518" y="116">dᵢⱼ = menor dist. borda-borda</text>
<text class="ts" x="518" y="132">entre patch i e patch j</text>
<text class="ts" x="518" y="148">da mesma classe</text>
<text class="ts" x="518" y="164">Mede isolamento espacial</text>
<!-- Mini visual: dois patches com seta ENN -->
<rect x="520" y="108" width="28" height="28" rx="3" fill="#A32D2D" opacity="0.7"/>
<rect x="596" y="112" width="22" height="22" rx="3" fill="#A32D2D" opacity="0.7"/>
<line x1="548" y1="122" x2="596" y2="122" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="4,2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text class="ts" x="572" y="114" text-anchor="middle" fill="#A32D2D">ENN</text>
<text class="ts" x="583" y="180" text-anchor="middle" fill="#A32D2D">→ isolamento</text>

<!-- Seção inferior: o que configuração adiciona -->
<line x1="20" y1="205" x2="660" y2="205" stroke="#c8c6be" stroke-width="0.6" stroke-dasharray="5,4"/>
<text class="th" x="340" y="226" text-anchor="middle">O que métricas de configuração medem além da composição</text>
<text class="ts" x="60" y="248">✓  Onde cada classe está na paisagem (posição relativa)</text>
<text class="ts" x="60" y="266">✓  Grau de fragmentação (NP, PD)</text>
<text class="ts" x="60" y="284">✓  Quantidade de borda e interface entre classes (ED, TE)</text>
<text class="ts" x="60" y="302">✓  Grau de agregação vs. dispersão dos patches (AI, CLUMPY)</text>
<text class="ts" x="60" y="320">✓  Isolamento dos patches e conectividade estrutural (ENN, PROX)</text>
<rect x="40" y="236" width="600" height="92" rx="6" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="4,3"/>

<text class="ts" x="340" y="352" text-anchor="middle">Figura 3 — Métricas de configuração: requerem coordenadas espaciais para o cálculo</text>
</svg>
