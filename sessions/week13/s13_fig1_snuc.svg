<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Cabeçalho SNUC -->
<rect x="180" y="8" width="320" height="32" rx="8" fill="#173404"/>
<text style="font-size:13px;font-weight:700;fill:white" x="340" y="30" text-anchor="middle">SNUC — Lei 9.985/2000</text>

<!-- Setas de divisão -->
<line x1="220" y1="40" x2="160" y2="68" stroke="#1a1a18" stroke-width="1.2"/>
<line x1="460" y1="40" x2="520" y2="68" stroke="#1a1a18" stroke-width="1.2"/>

<!-- Grupo 1: Proteção Integral -->
<rect x="20" y="68" width="295" height="34" rx="6" fill="#0C447C"/>
