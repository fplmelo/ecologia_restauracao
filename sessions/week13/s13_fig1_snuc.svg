<text style="font-size:10px;fill:#B5D4F4" x="168" y="103" text-anchor="middle">uso indireto apenas · preservação total</text>

<!-- 5 categorias PI -->
<rect x="20"  y="112" width="55" height="52" rx="5" fill="#185FA5" opacity="0.82"/>
