<text style="font-size:8px;fill:white"              x="520" y="140" text-anchor="middle">Extrativista</text>
<text style="font-size:8px;fill:#97C459"            x="520" y="158" text-anchor="middle">RESEX</text>

<rect x="545" y="112" width="40" height="52" rx="5" fill="#27500A" opacity="0.82"/>
<text style="font-size:8px;font-weight:600;fill:white" x="565" y="128" text-anchor="middle">Reserva</text>
<text style="font-size:8px;fill:white"              x="565" y="140" text-anchor="middle">de Fauna</text>

<rect x="590" y="112" width="40" height="52" rx="5" fill="#27500A" opacity="0.82"/>
<text style="font-size:8px;font-weight:600;fill:white" x="610" y="126" text-anchor="middle">Reserva</text>
<text style="font-size:8px;fill:white"              x="610" y="138" text-anchor="middle">Desenv.</text>
<text style="font-size:8px;fill:white"              x="610" y="150" text-anchor="middle">Sustentável</text>
<text style="font-size:8px;fill:#97C459"            x="610" y="162" text-anchor="middle">RDS</text>

<rect x="635" y="112" width="40" height="52" rx="5" fill="#27500A" opacity="0.82"/>
<text style="font-size:8px;font-weight:600;fill:white" x="655" y="126" text-anchor="middle">RPPN</text>
<text style="font-size:8px;fill:white"              x="655" y="138" text-anchor="middle">Reserva</text>
<text style="font-size:8px;fill:white"              x="655" y="150" text-anchor="middle">Part. Pat.</text>
<text style="font-size:8px;fill:white"              x="655" y="162" text-anchor="middle">Natural</text>

<!-- Zona de Amortecimento e Corredores -->
<rect x="20" y="180" width="640" height="44" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text style="font-size:11px;font-weight:600;fill:#173404" x="340" y="198" text-anchor="middle">Zona de Amortecimento (ZA) · Corredores Ecológicos</text>
<text class="ts" x="340" y="216" text-anchor="middle">A ZA envolve cada UC; corredores ligam UCs vizinhas — ambos previstos no SNUC como mecanismos de conectividade</text>

<!-- Números -->
<rect x="20" y="238" width="640" height="52" rx="6" fill="#F5E9C8" stroke="#BA7517" stroke-width="0.8"/>
<text style="font-size:11px;font-weight:600;fill:#633806" x="340" y="256" text-anchor="middle">Brasil em números (MMA 2024)</text>
<text class="ts" x="120" y="274" text-anchor="middle" fill="#0C447C">Proteção Integral</text>
<text style="font-size:13px;font-weight:700;fill:#0C447C" x="120" y="290" text-anchor="middle">~8%</text>
<text class="ts" x="340" y="274" text-anchor="middle" fill="#27500A">Uso Sustentável</text>
<text style="font-size:13px;font-weight:700;fill:#27500A" x="340" y="290" text-anchor="middle">~9%</text>
<text class="ts" x="560" y="274" text-anchor="middle" fill="#173404">Total protegido</text>
<text style="font-size:13px;font-weight:700;fill:#173404" x="560" y="290" text-anchor="middle">~17%</text>

<text class="ts" x="340" y="320" text-anchor="middle">Figura 1 — O SNUC (Lei 9.985/2000): dois grupos, 12 categorias e os mecanismos de conectividade entre UCs</text>
</svg>
