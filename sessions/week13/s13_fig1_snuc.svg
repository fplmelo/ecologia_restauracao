<text style="font-size:10px;fill:#97C459" x="512" y="103" text-anchor="middle">uso direto permitido · populações dentro</text>

<!-- 7 categorias US -->
<rect x="365" y="112" width="40" height="52" rx="5" fill="#27500A" opacity="0.82"/>
