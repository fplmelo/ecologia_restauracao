<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<text class="th" x="340" y="20" text-anchor="middle">Tipologia de Corredores Ecológicos — design e função</text>

<!-- PAINEL A: Corredor linear -->
<text style="font-size:11px;font-weight:600;fill:#173404" x="100" y="42" text-anchor="middle">a) Corredor linear</text>
<rect x="20" y="52" width="160" height="180" rx="6" fill="#F5E9C8" stroke="#8a8880" stroke-width="0.8"/>
<!-- Dois fragmentos grandes -->
<ellipse cx="50" cy="100" rx="25" ry="38" fill="#27500A" opacity="0.88"/>
<ellipse cx="148" cy="120" rx="22" ry="32" fill="#27500A" opacity="0.82"/>
<!-- Corredor estreito ligando -->
<rect x="74" y="108" width="53" height="14" rx="3" fill="#27500A" opacity="0.68"/>
<!-- Animais em trânsito -->
<circle cx="96" cy="115" r="4" fill="#EF9F27"/>
<circle cx="110" cy="115" r="4" fill="#EF9F27"/>
<text class="ts" x="100" y="218" text-anchor="middle" fill="#27500A">faixa contínua</text>
<text class="ts" x="100" y="232" text-anchor="middle" fill="#2c2c2a">alta dependência da largura</text>
<text class="ts" x="100" y="246" text-anchor="middle" fill="#2c2c2a">ex: mata ciliar, silvicultura</text>

<!-- PAINEL B: Stepping stones -->
<text style="font-size:11px;font-weight:600;fill:#173404" x="340" y="42" text-anchor="middle">b) Stepping stones</text>
<rect x="260" y="52" width="160" height="180" rx="6" fill="#F5E9C8" stroke="#8a8880" stroke-width="0.8"/>
<!-- Dois fragmentos grandes -->
<ellipse cx="290" cy="100" rx="22" ry="38" fill="#27500A" opacity="0.88"/>
<ellipse cx="408" cy="115" rx="20" ry="30" fill="#27500A" opacity="0.82"/>
<!-- Stepping stones intermediárias -->
<ellipse cx="328" cy="118" rx="12" ry="12" fill="#27500A" opacity="0.70"/>
<ellipse cx="360" cy="108" rx="10" ry="10" fill="#27500A" opacity="0.68"/>
<ellipse cx="386" cy="128" rx="8"  ry="8"  fill="#27500A" opacity="0.65"/>
<!-- Trajetória de dispersão -->
<path d="M312 118 Q328 115 340 112 Q360 106 375 118 Q390 128 390 122" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="218" text-anchor="middle" fill="#27500A">manchas intermediárias</text>
<text class="ts" x="340" y="232" text-anchor="middle" fill="#2c2c2a">adequadas para espécies</text>
<text class="ts" x="340" y="246" text-anchor="middle" fill="#2c2c2a">com alta capacidade dispersão</text>

<!-- PAINEL C: Rede de conectividade -->
<text style="font-size:11px;font-weight:600;fill:#173404" x="580" y="42" text-anchor="middle">c) Rede de conectividade</text>
<rect x="500" y="52" width="160" height="180" rx="6" fill="#F5E9C8" stroke="#8a8880" stroke-width="0.8"/>
<!-- Múltiplos fragmentos interconectados -->
<ellipse cx="530" cy="90"  rx="18" ry="20" fill="#27500A" opacity="0.85"/>
<ellipse cx="590" cy="80"  rx="15" ry="16" fill="#27500A" opacity="0.80"/>
<ellipse cx="650" cy="110" rx="16" ry="18" fill="#27500A" opacity="0.82"/>
<ellipse cx="545" cy="160" rx="20" ry="18" fill="#27500A" opacity="0.85"/>
<ellipse cx="625" cy="175" rx="18" ry="15" fill="#27500A" opacity="0.80"/>
<!-- Corredores ligando todos -->
<line x1="548" y1="90"  x2="575" y2="83"  stroke="#27500A" stroke-width="4" opacity="0.55"/>
<line x1="605" y1="85"  x2="634" y2="100" stroke="#27500A" stroke-width="3" opacity="0.50"/>
<line x1="540" y1="108" x2="545" y2="142" stroke="#27500A" stroke-width="3" opacity="0.50"/>
<line x1="565" y1="168" x2="607" y2="174" stroke="#27500A" stroke-width="3" opacity="0.50"/>
<line x1="648" y1="128" x2="640" y2="160" stroke="#27500A" stroke-width="2" opacity="0.45"/>
<text class="ts" x="580" y="218" text-anchor="middle" fill="#27500A">múltiplas rotas alternativas</text>
<text class="ts" x="580" y="232" text-anchor="middle" fill="#2c2c2a">maior resiliência a distúrbios</text>
<text class="ts" x="580" y="246" text-anchor="middle" fill="#2c2c2a">design ideal em planejamento</text>

<!-- Legenda -->
<ellipse cx="58" cy="272" rx="8" ry="8" fill="#27500A" opacity="0.85"/>
<text class="ts" x="72" y="276">Fragmento / UC</text>
<rect x="175" y="265" width="28" height="10" rx="2" fill="#27500A" opacity="0.6"/>
<text class="ts" x="210" y="276">Corredor / conexão</text>
<circle cx="354" cy="272" r="5" fill="#EF9F27"/>
<text class="ts" x="366" y="276">Organismo em dispersão</text>

<text class="ts" x="340" y="294" text-anchor="middle">Figura 3 — Tipologia de corredores ecológicos: linear, stepping stones e rede — eficácias distintas para espécies distintas</text>
</svg>
