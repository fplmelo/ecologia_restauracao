<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<text class="th" x="340" y="18" text-anchor="middle">Hierarquia de escalas no planejamento territorial da conservação</text>

<!-- Escala 1: Global / Federal (maior) -->
<rect x="20" y="30" width="640" height="46" rx="8" fill="#1a0a2e" opacity="0.88"/>
<text style="font-size:12px;font-weight:700;fill:#EEEDFE" x="340" y="50" text-anchor="middle">ESCALA GLOBAL / FEDERAL</text>
<text style="font-size:10px;fill:#AFA9EC" x="340" y="66" text-anchor="middle">Metas de Kunming-Montreal (30×30) · Convenção da Biodiversidade · SNUC · Código Florestal · ZEE Nacional</text>

<!-- Seta -->
<line x1="340" y1="78" x2="340" y2="94" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Escala 2: Estadual / Bioma -->
<rect x="30" y="96" width="620" height="44" rx="8" fill="#0C447C" opacity="0.85"/>
<text style="font-size:12px;font-weight:700;fill:white" x="340" y="114" text-anchor="middle">ESCALA ESTADUAL / BIOMA</text>
<text style="font-size:10px;fill:#B5D4F4" x="340" y="130" text-anchor="middle">Corredores Ecológicos Regionais · ZEE Estadual · SEUC · Planos de Bacia · Mapeamento de Áreas Prioritárias</text>

<!-- Seta -->
<line x1="340" y1="142" x2="340" y2="158" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Escala 3: Paisagem / Municipal -->
<rect x="50" y="160" width="580" height="44" rx="8" fill="#27500A" opacity="0.85"/>
<text style="font-size:12px;font-weight:700;fill:white" x="340" y="178" text-anchor="middle">ESCALA DE PAISAGEM / MUNICIPAL</text>
<text style="font-size:10px;fill:#97C459" x="340" y="194" text-anchor="middle">Mosaicos de UCs · Plano Diretor Municipal · Corredores locais · Compensação ambiental · Pagamento por Serviços Ecossistêmicos</text>

<!-- Seta -->
<line x1="340" y1="206" x2="340" y2="222" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Escala 4: Propriedade -->
<rect x="80" y="224" width="520" height="44" rx="8" fill="#BA7517" opacity="0.80"/>
<text style="font-size:12px;font-weight:700;fill:white" x="340" y="242" text-anchor="middle">ESCALA DA PROPRIEDADE</text>
<text style="font-size:10px;fill:#F5E9C8" x="340" y="258" text-anchor="middle">APP · Reserva Legal · CAR · PRA · Servidão Ambiental · RPPN · Manejo Sustentável</text>

<!-- Seta de retroalimentação (esquerda) -->
<path d="M18 268 Q8 180 18 100 Q22 74 30 54" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text style="font-size:9px;fill:#A32D2D" x="6" y="180" text-anchor="middle" writing-mode="tb">monitoramento e avaliação</text>

<text class="ts" x="340" y="284" text-anchor="middle">Figura 6 — Hierarquia de escalas: do global à propriedade, os instrumentos de planejamento territorial da conservação se aninham</text>
</svg>
