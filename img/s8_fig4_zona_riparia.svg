<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Área agrícola -->
<rect x="20" y="60" width="180" height="200" rx="6" fill="#BA7517" opacity="0.65"/>
<text class="th" x="110" y="88" text-anchor="middle" fill="white">Área agrícola</text>
<text class="ts" x="110" y="108" text-anchor="middle" fill="#F5E9C8">NO₃⁻: 15 mg/L</text>
<text class="ts" x="110" y="126" text-anchor="middle" fill="#F5E9C8">P total: 0.8 mg/L</text>
<text class="ts" x="110" y="144" text-anchor="middle" fill="#F5E9C8">Sedimento: alto</text>

<!-- Seta larga de fluxo -->
<rect x="200" y="148" width="20" height="24" fill="#A32D2D" opacity="0.9"/>
<polygon points="200,140 220,152 200,164" fill="#A32D2D" opacity="0.9"/>

<!-- Zona ripária -->
<rect x="222" y="60" width="200" height="200" rx="6" fill="#0C447C" opacity="0.72"/>
<text class="th" x="322" y="88" text-anchor="middle" fill="white">Zona Ripária</text>
<text class="ts" x="322" y="108" text-anchor="middle" fill="#B5D4F4">50–200 m de largura</text>
<!-- Processos internos -->
<rect x="238" y="118" width="168" height="100" rx="4" fill="#042C53" opacity="0.6"/>
<text class="ts" x="322" y="137" text-anchor="middle" fill="#E6F1FB">▸ Desnitrificação</text>
<text class="ts" x="322" y="155" text-anchor="middle" fill="#E6F1FB">  (N₂O, N₂ ↑)</text>
<text class="ts" x="322" y="173" text-anchor="middle" fill="#E6F1FB">▸ Assimilação vegetal</text>
<text class="ts" x="322" y="191" text-anchor="middle" fill="#E6F1FB">▸ Retenção de sedimento</text>
<text class="ts" x="322" y="209" text-anchor="middle" fill="#E6F1FB">▸ Adsorção de P no solo</text>

<!-- Seta de saída atenuada -->
<rect x="424" y="148" width="16" height="24" fill="#0F6E56" opacity="0.9"/>
<polygon points="424,140 440,152 424,164" fill="#0F6E56" opacity="0.9"/>

<!-- Rio -->
<rect x="442" y="60" width="150" height="200" rx="6" fill="#185FA5" opacity="0.75"/>
<text class="th" x="517" y="88" text-anchor="middle" fill="white">Rio</text>
<text class="ts" x="517" y="108" text-anchor="middle" fill="#E6F1FB">NO₃⁻: &lt;1 mg/L</text>
<text class="ts" x="517" y="126" text-anchor="middle" fill="#E6F1FB">P total: &lt;0.05 mg/L</text>
<text class="ts" x="517" y="144" text-anchor="middle" fill="#E6F1FB">Sedimento: baixo</text>

<!-- Eficiência de retenção -->
<rect x="22" y="278" width="636" height="30" rx="4" fill="#EAF3DE" opacity="0.8"/>
<text class="ts" x="340" y="296" text-anchor="middle" fill="#173404">Eficiência de remoção: NO₃⁻ 70–90% · P total 60–80% · sedimento &gt;80% (Lowrance et al. 1984; Correll et al. 1992)</text>

<!-- Seta de N₂O para cima -->
<line x1="322" y1="115" x2="322" y2="68" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text class="ts" x="330" y="62" fill="#BA7517">N₂O ↑</text>

<text class="ts" x="340" y="316" text-anchor="middle">Figura 4 — Zona ripária como filtro de nutrientes entre a paisagem agrícola e o sistema aquático</text>
</svg>
