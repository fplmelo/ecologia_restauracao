<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Painéis 2x2 -->

<!-- === TIPO 1: Clássica de Levins (topo-esq) === -->
<rect x="20" y="15" width="310" height="165" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text class="th" x="175" y="36" text-anchor="middle">1. Metapopulação clássica (Levins)</text>
<!-- Patches iguais, todos pequenos -->
<ellipse cx="70" cy="95" rx="28" ry="28" fill="#27500A" opacity="0.8"/>
<text class="ts" x="70" y="99" text-anchor="middle" fill="#C0DD97">A</text>
<ellipse cx="155" cy="75" rx="25" ry="25" fill="#888780" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
<text class="ts" x="155" y="79" text-anchor="middle">B</text>
<ellipse cx="230" cy="95" rx="27" ry="27" fill="#27500A" opacity="0.8"/>
<text class="ts" x="230" y="99" text-anchor="middle" fill="#C0DD97">C</text>
<ellipse cx="155" cy="135" rx="24" ry="24" fill="#27500A" opacity="0.75"/>
<text class="ts" x="155" y="139" text-anchor="middle" fill="#C0DD97">D</text>
<!-- setas bidirecionais -->
<line x1="98" y1="88" x2="130" y2="80" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
<line x1="178" y1="80" x2="203" y2="88" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
<line x1="155" y1="100" x2="155" y2="112" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
<text class="ts" x="175" y="155">Todos patches equivalentes; extinções e</text>
<text class="ts" x="175" y="168">colonizações balanceadas</text>

<!-- === TIPO 2: Mainland-Island (topo-dir) === -->
<rect x="350" y="15" width="310" height="165" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" x="505" y="36" text-anchor="middle">2. Mainland-Island (Harrison 1991)</text>
<!-- Mainland grande -->
<ellipse cx="410" cy="95" rx="45" ry="45" fill="#0C447C" opacity="0.85"/>
<text class="ts" x="410" y="90" text-anchor="middle" fill="white">Mainland</text>
<text class="ts" x="410" y="106" text-anchor="middle" fill="#B5D4F4">(fonte permanente)</text>
<!-- Islands pequenas -->
<ellipse cx="510" cy="70" rx="20" ry="20" fill="#378ADD" opacity="0.7"/>
<text class="ts" x="510" y="74" text-anchor="middle" fill="white">I1</text>
<ellipse cx="570" cy="105" rx="22" ry="22" fill="#888780" opacity="0.35" stroke="#5F5E5A" stroke-width="1"/>
<text class="ts" x="570" y="109" text-anchor="middle">I2</text>
<ellipse cx="530" cy="145" rx="18" ry="18" fill="#378ADD" opacity="0.65"/>
<text class="ts" x="530" y="149" text-anchor="middle" fill="white">I3</text>
<!-- Setas só da fonte para ilhas -->
<line x1="452" y1="72" x2="490" y2="64" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="455" y1="105" x2="549" y2="105" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="450" y1="130" x2="513" y2="143" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="360" y="155">Mainland nunca se extingue;</text>
<text class="ts" x="360" y="168">ilhas dependem de chuva de propágulos</text>

<!-- === TIPO 3: Source-Sink (baixo-esq) === -->
<rect x="20" y="200" width="310" height="165" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text class="th" x="175" y="221" text-anchor="middle">3. Source-Sink (Pulliam 1988)</text>
<!-- Source grande verde -->
<ellipse cx="90" cy="295" rx="48" ry="48" fill="#3B6D11" opacity="0.85"/>
<text class="ts" x="90" y="288" text-anchor="middle" fill="#C0DD97">SOURCE</text>
<text class="ts" x="90" y="304" text-anchor="middle" fill="#C0DD97">λ &gt; 1</text>
<!-- Sinks menores -->
<ellipse cx="210" cy="268" rx="30" ry="30" fill="#D85A30" opacity="0.7"/>
<text class="ts" x="210" y="265" text-anchor="middle" fill="white">SINK</text>
<text class="ts" x="210" y="281" text-anchor="middle" fill="white">λ &lt; 1</text>
<ellipse cx="280" cy="310" rx="25" ry="25" fill="#D85A30" opacity="0.65"/>
<text class="ts" x="280" y="307" text-anchor="middle" fill="white">SINK</text>
<text class="ts" x="280" y="323" text-anchor="middle" fill="white">λ &lt; 1</text>
<!-- Setas só da fonte para sinks -->
<line x1="136" y1="278" x2="181" y2="265" stroke="#BA7517" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="137" y1="310" x2="256" y2="316" stroke="#BA7517" stroke-width="2.5" marker-end="url(#arrow)"/>
<text class="ts" x="30" y="352">Source (λ&gt;1) exporta indivíduos; sinks</text>
<text class="ts" x="30" y="365">(λ&lt;1) subsistem via imigração</text>

<!-- === TIPO 4: Non-equilibrium (baixo-dir) === -->
<rect x="350" y="200" width="310" height="165" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text class="th" x="505" y="221" text-anchor="middle">4. Não-equilíbrio / Extinção em dívida</text>
<!-- Patches se apagando -->
<ellipse cx="410" cy="280" rx="40" ry="40" fill="#27500A" opacity="0.85"/>
<text class="ts" x="410" y="278" text-anchor="middle" fill="#C0DD97">Relíquia</text>
<text class="ts" x="410" y="294" text-anchor="middle" fill="#C0DD97">A</text>
<ellipse cx="510" cy="260" rx="28" ry="28" fill="#888780" opacity="0.3" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4,2"/>
<text class="ts" x="510" y="258" text-anchor="middle" fill="#A32D2D">extinto</text>
<ellipse cx="590" cy="295" rx="22" ry="22" fill="#888780" opacity="0.2" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4,2"/>
<text class="ts" x="590" y="293" text-anchor="middle" fill="#A32D2D">extinto</text>
<!-- Seta para baixo: declínio -->
<line x1="505" y1="238" x2="505" y2="222" stroke="#A32D2D" stroke-width="2" marker-start="url(#arrow)"/>
<text class="ts" x="360" y="352">Extinções sem recolonização; rumo à</text>
<text class="ts" x="360" y="365">extinção regional — ex: "extinção em dívida"</text>
</svg>
