<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Fundo: arquipélago de Åland (Finlândia) estilizado -->
<rect x="20" y="20" width="420" height="270" rx="8" fill="#E6F1FB" opacity="0.5"/>
<text class="th" x="230" y="42" text-anchor="middle">Åland, Finlândia — 1.500+ patches monitorados</text>

<!-- Patches ocupados (círculos laranja-avermelhados) -->
<!-- Ocupados -->
<circle cx="80" cy="90" r="12" fill="#D85A30" opacity="0.85"/><text class="ts" x="80" y="94" text-anchor="middle" fill="white">●</text>
<circle cx="130" cy="70" r="8" fill="#D85A30" opacity="0.8"/>
<circle cx="175" cy="100" r="14" fill="#D85A30" opacity="0.85"/>
<circle cx="140" cy="145" r="10" fill="#D85A30" opacity="0.8"/>
<circle cx="220" cy="80" r="9" fill="#D85A30" opacity="0.75"/>
<circle cx="270" cy="110" r="15" fill="#D85A30" opacity="0.85"/>
<circle cx="320" cy="90" r="8" fill="#D85A30" opacity="0.75"/>
<circle cx="350" cy="140" r="12" fill="#D85A30" opacity="0.8"/>
<circle cx="290" cy="175" r="11" fill="#D85A30" opacity="0.8"/>
<circle cx="200" cy="185" r="13" fill="#D85A30" opacity="0.85"/>
<circle cx="100" cy="195" r="10" fill="#D85A30" opacity="0.8"/>
<circle cx="160" cy="230" r="9" fill="#D85A30" opacity="0.75"/>
<circle cx="380" cy="200" r="14" fill="#D85A30" opacity="0.8"/>
<!-- Vazios -->
<circle cx="240" cy="145" r="8" fill="none" stroke="#888780" stroke-width="1.5"/>
<circle cx="310" cy="195" r="7" fill="none" stroke="#888780" stroke-width="1.5"/>
<circle cx="75" cy="155" r="6" fill="none" stroke="#888780" stroke-width="1.5"/>
<circle cx="340" cy="240" r="9" fill="none" stroke="#888780" stroke-width="1.5"/>
<circle cx="110" cy="240" r="7" fill="none" stroke="#888780" stroke-width="1.5"/>

<!-- Setas de movimento entre alguns patches -->
<line x1="142" y1="70" x2="163" y2="93" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
<line x1="255" y1="115" x2="235" y2="140" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
<line x1="350" y1="152" x2="316" y2="193" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

<!-- Legenda -->
<circle cx="40" cy="272" r="8" fill="#D85A30" opacity="0.85"/>
<text class="ts" x="55" y="276">Patch ocupado (c. 800 em média)</text>
<circle cx="230" cy="272" r="8" fill="none" stroke="#888780" stroke-width="1.5"/>
<text class="ts" x="245" y="276">Patch vazio (c. 700 em média)</text>

<!-- Painel de dados (direita) -->
<rect x="455" y="20" width="205" height="270" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text class="th" x="558" y="44" text-anchor="middle">Dados de campo</text>
<text class="ts" x="470" y="68">Espécie: Melitaea cinxia</text>
<text class="ts" x="470" y="86">(borboleta-de-damasco)</text>
<text class="ts" x="470" y="108">• ~1.500 patches mapeados</text>
<text class="ts" x="470" y="126">• ~800 ocupados por ano</text>
<text class="ts" x="470" y="144">• Monitoramento contínuo</text>
<text class="ts" x="470" y="162">  desde 1993</text>
<text class="ts" x="470" y="184">• Taxa extinção local: ~20%</text>
<text class="ts" x="470" y="202">  por geração</text>
<text class="ts" x="470" y="224">• Patches pequenos e isolados</text>
<text class="ts" x="470" y="242">  têm maior P(extinção)</text>
<text class="ts" x="470" y="264">• Efeito resgate confirmado</text>
<text class="ts" x="470" y="280">  empiricamente</text>

<text class="ts" x="340" y="308" text-anchor="middle">Figura 6 — Glanville fritillary: caso empírico clássico de metapopulação (Hanski et al. 1995)</text>
</svg>
