<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:14px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:12px; font-weight:400; fill:#2c2c2a; }
    .eq { font-size:15px; font-weight:600; fill:#173404; font-style:italic; }
  </style>
</defs>

<!-- Caixa da equação -->
<rect x="30" y="20" width="300" height="120" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1.2"/>
<text class="th" x="180" y="46" text-anchor="middle">Modelo de Levins (1969)</text>
<text class="eq" x="180" y="80" text-anchor="middle">dp/dt = c·p·(1–p) – e·p</text>
<text class="ts" x="50" y="105">p = proporção de patches ocupados</text>
<text class="ts" x="50" y="120">c = taxa de colonização   e = taxa de extinção</text>
<text class="ts" x="50" y="135">Equilíbrio:  p* = 1 – e/c</text>

<!-- Caixa das condições -->
<rect x="30" y="160" width="300" height="110" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.2"/>
<text class="th" x="180" y="183" text-anchor="middle">Condições de persistência</text>
<text class="ts" x="50" y="205">→  c &gt; e  →  metapopulação persiste</text>
<text class="ts" x="50" y="223">→  c &lt; e  →  metapopulação colapsa</text>
<text class="ts" x="50" y="241">→  p* = 0  quando e ≥ c</text>
<text class="ts" x="50" y="259">→  destruição de habitat reduz c e aumenta e</text>

<!-- Diagrama de estado (direita) -->
<text class="th" x="510" y="46" text-anchor="middle">Dinâmica de estados</text>

<!-- Estado OCUPADO -->
<rect x="400" y="60" width="110" height="55" rx="8" fill="#27500A" opacity="0.85"/>
<text class="th" x="455" y="83" text-anchor="middle" fill="#C0DD97">OCUPADO</text>
<text class="ts" x="455" y="102" text-anchor="middle" fill="#97C459">p</text>

<!-- Estado VAZIO -->
<rect x="570" y="60" width="90" height="55" rx="8" fill="#888780" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
<text class="th" x="615" y="83" text-anchor="middle">VAZIO</text>
<text class="ts" x="615" y="102" text-anchor="middle">(1–p)</text>

<!-- Seta extinção: OCUPADO → VAZIO -->
<path d="M510 75 Q540 50 570 75" fill="none" stroke="#A32D2D" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="46" text-anchor="middle" fill="#A32D2D">extinção (e)</text>

<!-- Seta colonização: VAZIO → OCUPADO -->
<path d="M570 100 Q540 125 510 100" fill="none" stroke="#0F6E56" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="130" text-anchor="middle" fill="#0F6E56">colonização (c·p)</text>

<!-- Efeito resgate -->
<rect x="400" y="175" width="260" height="100" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" x="530" y="198" text-anchor="middle" fill="#0C447C">Efeito Resgate (Hanski 1982)</text>
<text class="ts" x="415" y="220">Imigrantes de patches vizinhos</text>
<text class="ts" x="415" y="238">reduzem a probabilidade de extinção</text>
<text class="ts" x="415" y="256">local — especialmente em patches</text>
<text class="ts" x="415" y="272">pequenos com N baixo</text>
</svg>
