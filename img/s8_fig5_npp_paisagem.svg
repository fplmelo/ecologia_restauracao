<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- CENÁRIO 1: Paisagem contínua / cobertura alta -->
<text class="th" x="160" y="22" text-anchor="middle">Paisagem contínua (alta cobertura)</text>
<rect x="30" y="35" width="260" height="140" rx="6" fill="#27500A" opacity="0.82"/>
<text class="ts" x="160" y="85" text-anchor="middle" fill="#C0DD97">NPP alta e uniforme</text>
<text class="ts" x="160" y="103" text-anchor="middle" fill="#C0DD97">Menor perda de nutrientes</text>
<text class="ts" x="160" y="121" text-anchor="middle" fill="#C0DD97">Fechamento eficiente do ciclo</text>
<text class="ts" x="160" y="139" text-anchor="middle" fill="#C0DD97">Alta retenção de C e N</text>
<!-- Barra de NPP relativa -->
<rect x="95" y="188" width="130" height="24" rx="3" fill="#27500A" opacity="0.85"/>
<text class="ts" x="160" y="204" text-anchor="middle" fill="#C0DD97">NPP relativa: 100%</text>

<!-- CENÁRIO 2: Paisagem fragmentada (cobertura média) -->
<text class="th" x="500" y="22" text-anchor="middle">Paisagem fragmentada</text>
<!-- Vários fragmentos menores com matriz entre eles -->
<rect x="360" y="35" width="85" height="65" rx="5" fill="#27500A" opacity="0.78"/>
<rect x="460" y="35" width="60" height="55" rx="5" fill="#27500A" opacity="0.72"/>
<rect x="535" y="45" width="75" height="45" rx="5" fill="#27500A" opacity="0.68"/>
<rect x="370" y="115" width="55" height="60" rx="5" fill="#27500A" opacity="0.72"/>
<rect x="450" y="110" width="80" height="65" rx="5" fill="#27500A" opacity="0.75"/>
<rect x="545" y="108" width="65" height="67" rx="5" fill="#27500A" opacity="0.68"/>
<!-- Matriz entre fragmentos -->
<rect x="360" y="35" width="255" height="145" rx="6" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4,3"/>
<text class="ts" x="445" y="100" text-anchor="middle" fill="#888780">matriz</text>
<!-- Efeitos de borda - halos mais claros -->
<text class="ts" x="500" y="192" text-anchor="middle" fill="#A32D2D">Efeito de borda intens. nutrientes</text>
<!-- Barra NPP menor -->
<rect x="418" y="200" width="88" height="24" rx="3" fill="#639922" opacity="0.85"/>
<text class="ts" x="462" y="216" text-anchor="middle" fill="white">NPP relativa: ~75%</text>

<!-- Seta comparativa -->
<line x1="295" y1="115" x2="355" y2="115" stroke="#1a1a18" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="325" y="108" text-anchor="middle">fragmentação</text>

<!-- PARTE INFERIOR: heterogeneidade e hotspots -->
<line x1="30" y1="242" x2="650" y2="242" stroke="#c8c6be" stroke-width="0.5"/>
<text class="th" x="340" y="262" text-anchor="middle">Heterogeneidade e hotspots de produtividade</text>
<text class="ts" x="130" y="282" text-anchor="middle" fill="#27500A">▸ Zonas ripárias: NPP máxima</text>
<text class="ts" x="130" y="298" text-anchor="middle" fill="#27500A">  (subsidio hídrico + nutrientes)</text>
<text class="ts" x="380" y="282" text-anchor="middle" fill="#BA7517">▸ Zonas de borda: elevada NPP</text>
<text class="ts" x="380" y="298" text-anchor="middle" fill="#BA7517">  mas perda de N aumentada</text>
<text class="ts" x="580" y="282" text-anchor="middle" fill="#A32D2D">▸ Matriz agrícola: NPP alta</text>
<text class="ts" x="580" y="298" text-anchor="middle" fill="#A32D2D">  mas subsidio externo (fertiliz.)</text>
</svg>
