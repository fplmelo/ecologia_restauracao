<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Atmosfera (N₂) -->
<rect x="230" y="18" width="220" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" x="340" y="44" text-anchor="middle" fill="#0C447C">N₂ atmosférico</text>

<!-- Solo / Decomposição -->
<rect x="30" y="165" width="170" height="60" rx="8" fill="#633806" opacity="0.75"/>
<text class="th" x="115" y="190" text-anchor="middle" fill="white">Solo / Matéria orgânica</text>
<text class="ts" x="115" y="208" text-anchor="middle" fill="#F5E9C8">mineralização → NH₄⁺</text>

<!-- Vegetação -->
<rect x="255" y="130" width="170" height="60" rx="8" fill="#27500A" opacity="0.85"/>
<text class="th" x="340" y="155" text-anchor="middle" fill="#C0DD97">Vegetação</text>
<text class="ts" x="340" y="173" text-anchor="middle" fill="#97C459">assimilação de N</text>

<!-- Micro-organismos -->
<ellipse cx="115" cy="280" rx="80" ry="30" fill="#888780" opacity="0.5" stroke="#5F5E5A" stroke-width="1"/>
<text class="th" x="115" y="277" text-anchor="middle">Microrganismos</text>
<text class="ts" x="115" y="294" text-anchor="middle">nitrificação / desnitrif.</text>

<!-- Água (NO₃⁻ lixiviado) -->
<rect x="460" y="200" width="185" height="55" rx="8" fill="#185FA5" opacity="0.75"/>
<text class="th" x="552" y="224" text-anchor="middle" fill="white">Lençol / Rio</text>
<text class="ts" x="552" y="242" text-anchor="middle" fill="#E6F1FB">exportação de NO₃⁻</text>

<!-- Setas principais -->
<!-- Fixação N₂ → Solo -->
<path d="M255 55 Q180 90 185 163" fill="none" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="172" y="112" text-anchor="end" fill="#185FA5">fixação biológica</text>
<text class="ts" x="172" y="126" text-anchor="end" fill="#185FA5">e dep. atmosférica</text>

<!-- Solo → Vegetação (uptake) -->
<path d="M202 175 Q240 162 253 162" fill="none" stroke="#27500A" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="225" y="155" text-anchor="middle" fill="#27500A">uptake</text>

<!-- Vegetação → Solo (liteira) -->
<path d="M265 192 Q200 215 200 225" fill="none" stroke="#633806" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="188" y="228" text-anchor="end" fill="#633806">liteira / liteira</text>
<text class="ts" x="188" y="241" text-anchor="end" fill="#633806">raízes mortas</text>

<!-- Solo → Microorg. (mineralização) -->
<path d="M115 227 L115 250" fill="none" stroke="#888780" stroke-width="1.8" marker-end="url(#arrow)"/>

<!-- Microorg → volatilização (N₂O, NH₃) -->
<path d="M170 264 Q280 225 280 70" fill="none" stroke="#BA7517" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="295" y="185" fill="#BA7517">volatilização</text>
<text class="ts" x="295" y="199" fill="#BA7517">N₂O, NH₃</text>

<!-- Lixiviação: Solo → Água -->
<path d="M202 207 Q360 260 458 228" fill="none" stroke="#A32D2D" stroke-width="2.5" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="266" text-anchor="middle" fill="#A32D2D">lixiviação de NO₃⁻</text>
<text class="ts" x="340" y="280" text-anchor="middle" fill="#A32D2D">(exportação lateral)</text>

<!-- Desnitrificação: Água/solo → N₂ -->
<path d="M545 198 Q490 130 425 65" fill="none" stroke="#185FA5" stroke-width="1.8" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
<text class="ts" x="512" y="136" text-anchor="middle" fill="#185FA5">desnitrificação</text>
<text class="ts" x="512" y="150" text-anchor="middle" fill="#185FA5">(→ N₂, N₂O)</text>

<!-- Deposição atmosférica -->
<path d="M425 55 Q490 80 462 198" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="520" y="108" text-anchor="start" fill="#378ADD">deposição</text>
<text class="ts" x="520" y="122" text-anchor="start" fill="#378ADD">atmosférica</text>

<!-- Legenda -->
<text class="ts" x="340" y="322" text-anchor="middle">Figura 2 — Ciclo do N em escala de paisagem: fluxos internos (vegetação-solo) e exportação lateral via lixiviação e volatilização</text>
</svg>
