<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:14px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:12px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Fundo de paisagem -->
<rect x="20" y="20" width="640" height="285" rx="10" fill="#F5E9C8" opacity="0.4"/>
<text class="ts" x="340" y="316" text-anchor="middle">paisagem regional</text>

<!-- Patch 1: grande, ocupado - subpop A -->
<ellipse cx="120" cy="130" rx="70" ry="75" fill="#27500A" opacity="0.82"/>
<text class="th" x="120" y="118" text-anchor="middle" fill="#C0DD97">Subpop. A</text>
<text class="ts" x="120" y="136" text-anchor="middle" fill="#97C459">N = 85</text>
<text class="ts" x="120" y="152" text-anchor="middle" fill="#97C459">ocupado</text>

<!-- Patch 2: médio, ocupado - subpop B -->
<ellipse cx="320" cy="90" rx="52" ry="55" fill="#27500A" opacity="0.78"/>
<text class="th" x="320" y="80" text-anchor="middle" fill="#C0DD97">Subpop. B</text>
<text class="ts" x="320" y="97" text-anchor="middle" fill="#97C459">N = 40</text>
<text class="ts" x="320" y="113" text-anchor="middle" fill="#97C459">ocupado</text>

<!-- Patch 3: pequeno, vazio (extinto recentemente) -->
<ellipse cx="490" cy="105" rx="35" ry="38" fill="#888780" opacity="0.4"/>
<text class="th" x="490" y="96" text-anchor="middle" fill="#2c2c2a">Patch C</text>
<text class="ts" x="490" y="113" text-anchor="middle" fill="#A32D2D">extinto</text>
<text class="ts" x="490" y="128" text-anchor="middle" fill="#A32D2D">(vazio)</text>

<!-- Patch 4: médio, ocupado - subpop D -->
<ellipse cx="560" cy="230" rx="55" ry="50" fill="#27500A" opacity="0.75"/>
<text class="th" x="560" y="220" text-anchor="middle" fill="#C0DD97">Subpop. D</text>
<text class="ts" x="560" y="237" text-anchor="middle" fill="#97C459">N = 55</text>
<text class="ts" x="560" y="253" text-anchor="middle" fill="#97C459">ocupado</text>

<!-- Patch 5: grande, ocupado - subpop E -->
<ellipse cx="230" cy="230" rx="65" ry="58" fill="#27500A" opacity="0.80"/>
<text class="th" x="230" y="220" text-anchor="middle" fill="#C0DD97">Subpop. E</text>
<text class="ts" x="230" y="237" text-anchor="middle" fill="#97C459">N = 70</text>
<text class="ts" x="230" y="253" text-anchor="middle" fill="#97C459">ocupado</text>

<!-- Setas de dispersão entre populações -->
<!-- A → B -->
<path d="M186 108 Q235 78 270 87" fill="none" stroke="#EF9F27" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
<!-- B → C (tentativa de recolonização) -->
<path d="M370 85 Q420 80 456 96" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)" opacity="0.7"/>
<!-- A → E -->
<path d="M155 188 Q180 218 168 224" fill="none" stroke="#EF9F27" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
<!-- E → D -->
<path d="M293 238 Q400 248 506 240" fill="none" stroke="#EF9F27" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
<!-- D → C (recolonização de C) -->
<path d="M530 182 Q510 148 522 140" fill="none" stroke="#0F6E56" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="552" y="160" fill="#0F6E56">recolonização</text>
<text class="ts" x="552" y="175" fill="#0F6E56">potencial</text>

<!-- Legenda -->
<ellipse cx="45" cy="294" rx="10" ry="8" fill="#27500A" opacity="0.8"/>
<text class="ts" x="62" y="298">Subpopulação (ocupado)</text>
<ellipse cx="230" cy="294" rx="10" ry="8" fill="#888780" opacity="0.4"/>
<text class="ts" x="247" y="298">Patch vazio (extinto)</text>
<line x1="390" y1="294" x2="418" y2="294" stroke="#EF9F27" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="425" y="298">Dispersão / migração</text>
</svg>
