<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Painel esq: efeito do tamanho do patch na extinção -->
<text class="th" x="160" y="22" text-anchor="middle">Área do patch → extinção local</text>
<!-- Eixos -->
<line x1="50" y1="260" x2="290" y2="260" stroke="#1a1a18" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="50" y1="260" x2="50" y2="40" stroke="#1a1a18" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="170" y="280" text-anchor="middle">Área do patch</text>
<text class="ts" x="30" y="152" text-anchor="middle" transform="rotate(-90 30 152)">P(extinção)</text>
<text class="ts" x="42" y="256" text-anchor="end">0</text>
<text class="ts" x="42" y="50" text-anchor="end">alta</text>
<!-- Curva descendente: maior área = menor extinção -->
<path d="M55 55 Q100 80 160 160 Q200 200 280 250" fill="none" stroke="#A32D2D" stroke-width="2.5"/>
<!-- Pontos ilustrativos -->
<circle cx="80" cy="72" r="6" fill="#A32D2D" opacity="0.85"/>
<text class="ts" x="92" y="68" fill="#A32D2D">patch pequeno</text>
<text class="ts" x="92" y="80" fill="#A32D2D">P(extinção) alta</text>
<circle cx="230" cy="220" r="6" fill="#0F6E56" opacity="0.85"/>
<text class="ts" x="242" y="216" fill="#0F6E56">patch grande</text>
<text class="ts" x="242" y="228" fill="#0F6E56">P(extinção) baixa</text>
<!-- Rótulo N -->
<text class="ts" x="170" y="198" text-anchor="middle" fill="#2c2c2a">N ↑   →   estoc. demog. ↓</text>

<!-- Divisor -->
<line x1="340" y1="20" x2="340" y2="295" stroke="#c8c6be" stroke-width="0.7" stroke-dasharray="5,3"/>

<!-- Painel dir: efeito isolamento na colonização -->
<text class="th" x="510" y="22" text-anchor="middle">Isolamento → colonização</text>
<!-- Eixos -->
<line x1="360" y1="260" x2="650" y2="260" stroke="#1a1a18" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="360" y1="260" x2="360" y2="40" stroke="#1a1a18" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="505" y="280" text-anchor="middle">Distância / isolamento</text>
<text class="ts" x="340" y="152" text-anchor="middle" transform="rotate(-90 340 152)">P(colonização)</text>
<text class="ts" x="352" y="256" text-anchor="end">0</text>
<text class="ts" x="352" y="50" text-anchor="end">alta</text>
<!-- Curva descendente: maior isolamento = menor colonização -->
<path d="M365 55 Q410 90 470 160 Q520 210 640 255" fill="none" stroke="#0F6E56" stroke-width="2.5"/>
<!-- Ponto próximo -->
<circle cx="400" cy="80" r="6" fill="#0F6E56" opacity="0.85"/>
<text class="ts" x="412" y="76" fill="#0F6E56">patch próximo</text>
<text class="ts" x="412" y="88" fill="#0F6E56">P(colonização) alta</text>
<!-- Ponto distante -->
<circle cx="580" cy="230" r="6" fill="#A32D2D" opacity="0.85"/>
<text class="ts" x="540" y="218" text-anchor="end" fill="#A32D2D">patch distante</text>
<text class="ts" x="540" y="230" text-anchor="end" fill="#A32D2D">P(colonização) baixa</text>

<!-- Resumo em baixo -->
<rect x="30" y="290" width="620" height="24" rx="4" fill="#EAF3DE" opacity="0.7"/>
<text class="ts" x="340" y="307" text-anchor="middle" fill="#173404">Paradigma área-isolamento (Hanski 1994): área grande + patches próximos = maior persistência da metapopulação</text>
</svg>
