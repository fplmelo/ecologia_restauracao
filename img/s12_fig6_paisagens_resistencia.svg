<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:12px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:10px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<text style="font-size:13px;font-weight:600;fill:#1a1a18" x="340" y="18" text-anchor="middle">Paisagens de resistência: modos alternativos de produzir o espaço</text>

<!-- Card 1: Agroecologia / Quintais -->
<rect x="20" y="30" width="140" height="155" rx="8" fill="#27500A" opacity="0.85"/>
<text style="font-size:11px;font-weight:700;fill:#C0DD97" x="90" y="52" text-anchor="middle">Agroecologia</text>
<text class="ts" x="90" y="70" text-anchor="middle" fill="#97C459">Quintais florestais</text>
<text class="ts" x="30" y="90" fill="#97C459">▸ Alta diversidade</text>
<text class="ts" x="30" y="106" fill="#97C459">▸ Sem insumos</text>
<text class="ts" x="30" y="122" fill="#97C459">  sintéticos</text>
<text class="ts" x="30" y="138" fill="#97C459">▸ Espécies nativas</text>
<text class="ts" x="30" y="154" fill="#97C459">▸ Soberania</text>
<text class="ts" x="30" y="170" fill="#97C459">  alimentar</text>

<!-- Card 2: Territórios quilombolas -->
<rect x="170" y="30" width="140" height="155" rx="8" fill="#633806" opacity="0.82"/>
<text style="font-size:11px;font-weight:700;fill:white" x="240" y="52" text-anchor="middle">Territórios</text>
<text style="font-size:11px;font-weight:700;fill:white" x="240" y="66" text-anchor="middle">Quilombolas</text>
<text class="ts" x="180" y="88" fill="#F5E9C8">▸ Manejo florestal</text>
<text class="ts" x="180" y="104" fill="#F5E9C8">  comunitário</text>
<text class="ts" x="180" y="120" fill="#F5E9C8">▸ Roças de coivara</text>
<text class="ts" x="180" y="136" fill="#F5E9C8">▸ Uso de cipós,</text>
<text class="ts" x="180" y="152" fill="#F5E9C8">  plantas medicinais</text>
<text class="ts" x="180" y="168" fill="#F5E9C8">▸ Resistência à</text>
<text class="ts" x="180" y="182" fill="#F5E9C8">  expropriação</text>

<!-- Card 3: Reservas Extrativistas -->
<rect x="320" y="30" width="140" height="155" rx="8" fill="#185FA5" opacity="0.80"/>
<text style="font-size:11px;font-weight:700;fill:white" x="390" y="52" text-anchor="middle">Reservas</text>
<text style="font-size:11px;font-weight:700;fill:white" x="390" y="66" text-anchor="middle">Extrativistas</text>
<text class="ts" x="330" y="88" fill="#E6F1FB">▸ Seringueiros,</text>
<text class="ts" x="330" y="104" fill="#E6F1FB">  castanheiros</text>
<text class="ts" x="330" y="120" fill="#E6F1FB">▸ Floresta em pé</text>
<text class="ts" x="330" y="136" fill="#E6F1FB">▸ Chico Mendes:</text>
<text class="ts" x="330" y="152" fill="#E6F1FB">  paradigma global</text>
<text class="ts" x="330" y="168" fill="#E6F1FB">▸ Conflito com</text>
<text class="ts" x="330" y="184" fill="#E6F1FB">  madeireiros</text>

<!-- Card 4: Mapeamento participativo -->
<rect x="470" y="30" width="190" height="155" rx="8" fill="#2c1a5e" opacity="0.82"/>
<text style="font-size:11px;font-weight:700;fill:#EEEDFE" x="565" y="52" text-anchor="middle">Mapeamento</text>
<text style="font-size:11px;font-weight:700;fill:#EEEDFE" x="565" y="66" text-anchor="middle">Participativo</text>
<text class="ts" x="480" y="88" fill="#AFA9EC">▸ Contra-cartografia</text>
<text class="ts" x="480" y="104" fill="#AFA9EC">▸ Povos redefinem</text>
<text class="ts" x="480" y="120" fill="#AFA9EC">  seus territórios</text>
<text class="ts" x="480" y="136" fill="#AFA9EC">▸ SIGs comunitários</text>
<text class="ts" x="480" y="152" fill="#AFA9EC">▸ Instrumento legal</text>
<text class="ts" x="480" y="168" fill="#AFA9EC">  de demarcação</text>
<text class="ts" x="480" y="184" fill="#AFA9EC">▸ "O mapa como arma"</text>

<!-- Barra inferior: o que une -->
<rect x="20" y="198" width="640" height="44" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text style="font-size:11px;font-weight:600;fill:#173404" x="340" y="216" text-anchor="middle">Paisagens de resistência têm métricas ecológicas sistematicamente melhores</text>
<text class="ts" x="340" y="233" text-anchor="middle">Menor desmatamento · Maior diversidade de espécies · Maior conectividade · Maior estoque de carbono — com menor custo social</text>

<text class="ts" x="340" y="264" text-anchor="middle">Figura 6 — Modos alternativos de produzir o espaço: paisagens de resistência como resultado de práticas territoriais distintas</text>
</svg>
