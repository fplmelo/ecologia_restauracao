<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<text class="th" x="340" y="18" text-anchor="middle">Grandes corredores de biodiversidade prioritários no Brasil</text>

<!-- Mapa estilizado do Brasil -->
<ellipse cx="340" cy="175" rx="195" ry="148" fill="#F5E9C8" stroke="#8a8880" stroke-width="1" opacity="0.6"/>

<!-- Corredor 1: Corredor Central da Mata Atlântica (leste) -->
<path d="M465 68 Q480 100 485 140 Q490 175 480 205 Q470 235 455 255" fill="none" stroke="#185FA5" stroke-width="12" opacity="0.55"/>
<text style="font-size:10px;font-weight:600;fill:#0C447C" x="520" y="105" text-anchor="middle">Corredor Central</text>
<text style="font-size:10px;fill:#185FA5" x="520" y="119" text-anchor="middle">da Mata Atlântica</text>
<text style="font-size:9px;fill:#185FA5" x="520" y="133" text-anchor="middle">RJ→BA</text>

<!-- Corredor 2: Corredor da Serra do Mar (sul) -->
<path d="M460 255 Q450 270 435 280 Q415 292 390 295 Q365 298 345 295" fill="none" stroke="#27500A" stroke-width="10" opacity="0.55"/>
<text style="font-size:10px;font-weight:600;fill:#173404" x="370" y="316" text-anchor="middle">Corredor Serra do Mar</text>
<text style="font-size:9px;fill:#27500A" x="370" y="328" text-anchor="middle">SP→SC</text>

<!-- Corredor 3: Corredor Beni-Cerrado-Pantanal (centro-oeste) -->
<path d="M265 165 Q280 190 290 215 Q298 238 300 258" fill="none" stroke="#BA7517" stroke-width="11" opacity="0.52"/>
<text style="font-size:10px;font-weight:600;fill:#633806" x="185" y="220" text-anchor="middle">Corredor</text>
<text style="font-size:10px;fill:#BA7517" x="185" y="234" text-anchor="middle">Cerrado-Pantanal</text>
<text style="font-size:9px;fill:#BA7517" x="185" y="248" text-anchor="middle">MT→MS</text>

<!-- Corredor 4: Amazônia (norte) -->
<path d="M175 110 Q240 90 310 85 Q370 83 430 90" fill="none" stroke="#27500A" stroke-width="14" opacity="0.50"/>
<text style="font-size:10px;font-weight:600;fill:#173404" x="300" y="70" text-anchor="middle">Corredor da Amazônia Central</text>
<text style="font-size:9px;fill:#27500A" x="300" y="83" text-anchor="middle">AM → PA → AP</text>

<!-- Corredor 5: Caatinga / APNE -->
<path d="M415 110 Q435 130 445 155 Q450 175 445 195" fill="none" stroke="#A32D2D" stroke-width="8" opacity="0.50"/>
<text style="font-size:10px;font-weight:600;fill:#791F1F" x="540" y="160" text-anchor="middle">Corredor</text>
<text style="font-size:10px;fill:#A32D2D" x="540" y="174" text-anchor="middle">da Caatinga</text>
<text style="font-size:9px;fill:#A32D2D" x="540" y="188" text-anchor="middle">NE → BA</text>

<!-- UCs âncora (pontos grandes) -->
<circle cx="475" cy="78"  r="8" fill="#0C447C" opacity="0.9"/>
<circle cx="485" cy="205" r="8" fill="#0C447C" opacity="0.9"/>
<circle cx="285" cy="175" r="8" fill="#0C447C" opacity="0.9"/>
<circle cx="195" cy="112" r="8" fill="#0C447C" opacity="0.9"/>
<circle cx="440" cy="195" r="7" fill="#0C447C" opacity="0.85"/>
<circle cx="390" cy="290" r="7" fill="#0C447C" opacity="0.85"/>

<!-- Legenda -->
<rect x="30" y="290" width="12" height="8" rx="2" fill="#0C447C" opacity="0.9"/>
<text class="ts" x="48" y="300">UC âncora</text>
<rect x="120" y="290" width="22" height="8" rx="2" fill="#27500A" opacity="0.6"/>
<text class="ts" x="148" y="300">Corredor Amazônia / MA</text>
<rect x="310" y="290" width="22" height="8" rx="2" fill="#BA7517" opacity="0.6"/>
<text class="ts" x="338" y="300">Corredor Cerrado</text>
<rect x="450" y="290" width="22" height="8" rx="2" fill="#A32D2D" opacity="0.6"/>
<text class="ts" x="478" y="300">Corredor Caatinga</text>

<text class="ts" x="340" y="318" text-anchor="middle">Figura 5 — Grandes corredores de biodiversidade prioritários no Brasil (MMA/PROBIO; CBH) — escala regional de planejamento</text>
</svg>
