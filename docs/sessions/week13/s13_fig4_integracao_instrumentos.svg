<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<text class="th" x="340" y="18" text-anchor="middle">Instrumentos de proteção integrados na escala da propriedade e da paisagem</text>

<!-- Propriedade rural (fundo) -->
<rect x="30" y="28" width="430" height="240" rx="8" fill="#F5E9C8" stroke="#BA7517" stroke-width="1.5"/>
<text style="font-size:11px;font-weight:600;fill:#BA7517" x="245" y="46" text-anchor="middle">Propriedade rural</text>

<!-- Área produtiva (uso agrícola/pastagem) -->
<rect x="50" y="55" width="240" height="150" rx="4" fill="#BA7517" opacity="0.30"/>
<text class="ts" x="170" y="90"  text-anchor="middle" fill="#633806">Área de uso produtivo</text>
<text class="ts" x="170" y="106" text-anchor="middle" fill="#633806">pastagem / lavoura</text>

<!-- Reserva Legal (RL) -->
<rect x="310" y="55" width="130" height="150" rx="4" fill="#3B6D11" opacity="0.78"/>
<text style="font-size:11px;font-weight:600;fill:#C0DD97" x="375" y="105" text-anchor="middle">Reserva</text>
<text style="font-size:11px;font-weight:600;fill:#C0DD97" x="375" y="120" text-anchor="middle">Legal (RL)</text>
<text class="ts" x="375" y="140" text-anchor="middle" fill="#97C459">20% (NE)</text>
<text class="ts" x="375" y="156" text-anchor="middle" fill="#97C459">manejo sustentável</text>
<text class="ts" x="375" y="172" text-anchor="middle" fill="#97C459">permitido</text>

<!-- Rio dentro da propriedade -->
<path d="M30 200 Q120 188 200 195 Q280 202 430 190" fill="none" stroke="#185FA5" stroke-width="6" opacity="0.75"/>
<text class="ts" x="230" y="184" text-anchor="middle" fill="#185FA5">rio (&lt;10 m)</text>

<!-- APP ripária (faixas ao longo do rio) -->
<path d="M30 175 Q120 162 200 168 Q280 175 430 164" fill="none" stroke="#378ADD" stroke-width="18" opacity="0.30"/>
<path d="M30 224 Q120 212 200 218 Q280 225 430 214" fill="none" stroke="#378ADD" stroke-width="18" opacity="0.30"/>
<text class="ts" x="100" y="157" text-anchor="middle" fill="#185FA5">APP 30 m</text>

<!-- UC de proteção integral (fora da propriedade, à direita) -->
<rect x="480" y="28" width="170" height="240" rx="8" fill="#0C447C" opacity="0.82"/>
<text style="font-size:11px;font-weight:700;fill:white" x="565" y="55" text-anchor="middle">Parque Nacional</text>
<text class="ts" x="565" y="72" text-anchor="middle" fill="#B5D4F4">(UC Proteção Integral)</text>
<text class="ts" x="565" y="92"  text-anchor="middle" fill="#B5D4F4">Proteção total</text>
<text class="ts" x="565" y="108" text-anchor="middle" fill="#B5D4F4">Pesquisa permitida</text>
<text class="ts" x="565" y="124" text-anchor="middle" fill="#B5D4F4">Turismo controlado</text>

<!-- Zona de Amortecimento -->
<rect x="460" y="28" width="20" height="240" rx="0" fill="#378ADD" opacity="0.22"/>
<text style="font-size:9px;fill:#0C447C;writing-mode:tb" x="468" y="220">Zona de Amortecimento</text>

<!-- Corredor: RL da propriedade → UC -->
<rect x="440" y="100" width="42" height="50" rx="3" fill="#27500A" opacity="0.65"/>
<text style="font-size:9px;font-weight:600;fill:#C0DD97" x="461" y="122" text-anchor="middle">corredor</text>
<text style="font-size:9px;fill:#C0DD97" x="461" y="136" text-anchor="middle">ecológico</text>

<!-- Legenda -->
<rect x="30" y="280" width="12" height="12" rx="2" fill="#BA7517" opacity="0.4"/>
<text class="ts" x="47" y="291">Uso produtivo</text>
<rect x="125" y="280" width="12" height="12" rx="2" fill="#3B6D11" opacity="0.8"/>
<text class="ts" x="142" y="291">Reserva Legal</text>
<rect x="225" y="280" width="12" height="12" rx="2" fill="#378ADD" opacity="0.4"/>
<text class="ts" x="242" y="291">APP ripária</text>
<rect x="320" y="280" width="12" height="12" rx="2" fill="#0C447C" opacity="0.8"/>
<text class="ts" x="337" y="291">UC Prot. Integral</text>
<rect x="445" y="280" width="12" height="12" rx="2" fill="#27500A" opacity="0.7"/>
<text class="ts" x="462" y="291">Corredor ecológico</text>

<text class="ts" x="340" y="306" text-anchor="middle">Figura 4 — Integração dos instrumentos: APP, RL na propriedade conectam-se via corredor à UC adjacente</text>
</svg>
