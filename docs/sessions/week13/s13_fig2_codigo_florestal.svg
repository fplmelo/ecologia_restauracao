<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<text class="th" x="340" y="20" text-anchor="middle">Código Florestal (Lei 12.651/2012) — APP e Reserva Legal</text>

<!-- COLUNA APP -->
<rect x="20" y="32" width="310" height="270" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text style="font-size:12px;font-weight:700;fill:#0C447C" x="175" y="54" text-anchor="middle">Áreas de Preservação Permanente (APP)</text>
<text class="ts" x="175" y="70" text-anchor="middle" fill="#185FA5">uso econômico VEDADO · proteção de funções ecológicas</text>

<!-- APPs ripárias -->
<rect x="36" y="80" width="278" height="90" rx="6" fill="white" stroke="#185FA5" stroke-width="0.6"/>
<text style="font-size:11px;font-weight:600;fill:#0C447C" x="175" y="97" text-anchor="middle">APP Ripária (art. 4º — margem de rios)</text>
<text class="ts" x="42" y="115">Largura do rio &lt; 10 m → APP = 30 m</text>
<text class="ts" x="42" y="131">Largura 10–50 m → APP = 50 m</text>
<text class="ts" x="42" y="147">Largura 50–200 m → APP = 100 m</text>
<text class="ts" x="42" y="163">Largura &gt; 600 m → APP = 500 m</text>

<!-- Outras APPs -->
<rect x="36" y="178" width="278" height="108" rx="6" fill="white" stroke="#185FA5" stroke-width="0.6"/>
<text style="font-size:11px;font-weight:600;fill:#0C447C" x="175" y="196" text-anchor="middle">Outras APPs legais (art. 4º)</text>
<text class="ts" x="42" y="214">▸ Entorno de nascentes e olhos d'água: 50 m</text>
<text class="ts" x="42" y="230">▸ Topo de morro (&gt;100m, incl. &gt;25°): 2/3 da altura</text>
<text class="ts" x="42" y="246">▸ Encostas com inclinação &gt; 45°: integral</text>
<text class="ts" x="42" y="262">▸ Bordas de tabuleiros e chapadas: 100 m</text>
<text class="ts" x="42" y="278">▸ Manguezais e restingas: integral</text>

<!-- COLUNA Reserva Legal -->
<rect x="350" y="32" width="310" height="270" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1.2"/>
<text style="font-size:12px;font-weight:700;fill:#173404" x="505" y="54" text-anchor="middle">Reserva Legal (RL)</text>
<text class="ts" x="505" y="70" text-anchor="middle" fill="#27500A">uso sustentável permitido · percentual mínimo por bioma</text>

<!-- Percentuais por bioma -->
<rect x="366" y="80" width="278" height="148" rx="6" fill="white" stroke="#639922" stroke-width="0.6"/>
<text style="font-size:11px;font-weight:600;fill:#173404" x="505" y="98" text-anchor="middle">Percentuais mínimos de RL (art. 12)</text>

<!-- Barras proporcionais -->
<!-- Amazônia 80% -->
<rect x="374" y="108" width="180" height="18" rx="3" fill="#27500A" opacity="0.82"/>
<text class="ts" x="562" y="121" fill="#173404">Amazônia Legal: 80%</text>

<!-- Cerrado 35% -->
<rect x="374" y="132" width="79" height="18" rx="3" fill="#3B6D11" opacity="0.80"/>
<text class="ts" x="562" y="145" fill="#173404">Cerrado (Am. Legal): 35%</text>

<!-- Demais regiões 20% -->
<rect x="374" y="156" width="45" height="18" rx="3" fill="#639922" opacity="0.78"/>
<text class="ts" x="562" y="169" fill="#173404">Demais regiões: 20%</text>
<!-- Campos gerais 20% -->
<rect x="374" y="180" width="45" height="18" rx="3" fill="#97C459" opacity="0.78"/>
<text class="ts" x="562" y="193" fill="#173404">Campos gerais: 20%</text>
<!-- Referência 100% -->
<line x1="374" y1="105" x2="374" y2="202" stroke="#639922" stroke-width="0.5"/>
<text style="font-size:9px;fill:#888780" x="374" y="218" text-anchor="start">0%</text>
<text style="font-size:9px;fill:#888780" x="554" y="218" text-anchor="end">100%</text>

<!-- Outros instrumentos -->
<rect x="366" y="224" width="278" height="62" rx="6" fill="white" stroke="#639922" stroke-width="0.6"/>
<text style="font-size:11px;font-weight:600;fill:#173404" x="505" y="240" text-anchor="middle">Instrumentos complementares (art. 66)</text>
<text class="ts" x="372" y="258">▸ CAR: Cadastro Ambiental Rural (obrigatório)</text>
<text class="ts" x="372" y="274">▸ PRA: Programa de Regularização Ambiental</text>
<text class="ts" x="372" y="288">▸ CRA: Cota de Reserva Ambiental (compensação)</text>

<text class="ts" x="340" y="318" text-anchor="middle">Figura 2 — APP e Reserva Legal no Código Florestal (Lei 12.651/2012): instrumentos complementares, não equivalentes</text>
</svg>
