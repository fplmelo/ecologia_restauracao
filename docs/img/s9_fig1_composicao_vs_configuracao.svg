<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
    .label { font-size:12px; font-weight:500; fill:#1a1a18; }
  </style>
</defs>

<!-- PAISAGEM A: composição 50/50, fragmentada -->
<text class="th" x="160" y="22" text-anchor="middle">Paisagem A</text>
<text class="ts" x="160" y="38" text-anchor="middle">Composição idêntica · Configuração fragmentada</text>
<rect x="30" y="48" width="260" height="220" rx="6" fill="#F5E9C8" stroke="#8a8880" stroke-width="1"/>

<!-- Grade 5x4 de células — padrão xadrez fragmentado -->
<rect x="30"  y="48"  width="52" height="55" fill="#27500A" opacity="0.82"/>
<rect x="82"  y="48"  width="52" height="55" fill="#BA7517" opacity="0.72"/>
<rect x="134" y="48"  width="52" height="55" fill="#27500A" opacity="0.82"/>
<rect x="186" y="48"  width="52" height="55" fill="#BA7517" opacity="0.72"/>
<rect x="238" y="48"  width="52" height="55" fill="#27500A" opacity="0.82"/>

<rect x="30"  y="103" width="52" height="55" fill="#BA7517" opacity="0.72"/>
<rect x="82"  y="103" width="52" height="55" fill="#27500A" opacity="0.82"/>
<rect x="134" y="103" width="52" height="55" fill="#BA7517" opacity="0.72"/>
<rect x="186" y="103" width="52" height="55" fill="#27500A" opacity="0.82"/>
<rect x="238" y="103" width="52" height="55" fill="#BA7517" opacity="0.72"/>

<rect x="30"  y="158" width="52" height="55" fill="#27500A" opacity="0.82"/>
<rect x="82"  y="158" width="52" height="55" fill="#BA7517" opacity="0.72"/>
<rect x="134" y="158" width="52" height="55" fill="#27500A" opacity="0.82"/>
<rect x="186" y="158" width="52" height="55" fill="#BA7517" opacity="0.72"/>
<rect x="238" y="158" width="52" height="55" fill="#27500A" opacity="0.82"/>

<rect x="30"  y="213" width="52" height="55" fill="#BA7517" opacity="0.72"/>
<rect x="82"  y="213" width="52" height="55" fill="#27500A" opacity="0.82"/>
<rect x="134" y="213" width="52" height="55" fill="#BA7517" opacity="0.72"/>
<rect x="186" y="213" width="52" height="55" fill="#27500A" opacity="0.82"/>
<rect x="238" y="213" width="52" height="55" fill="#BA7517" opacity="0.72"/>

<!-- Métricas Paisagem A -->
<text class="ts" x="160" y="283" text-anchor="middle">PLAND floresta = 50%  |  NP = 10  |  ED alta  |  AI baixo</text>
<text class="ts" x="160" y="298" text-anchor="middle" fill="#A32D2D">Alta fragmentação · Muita borda · Patches pequenos</text>

<!-- PAISAGEM B: composição 50/50, agregada -->
<text class="th" x="510" y="22" text-anchor="middle">Paisagem B</text>
<text class="ts" x="510" y="38" text-anchor="middle">Composição idêntica · Configuração agregada</text>
<rect x="380" y="48" width="260" height="220" rx="6" fill="#F5E9C8" stroke="#8a8880" stroke-width="1"/>

<!-- Dois grandes blocos contíguos -->
<rect x="380" y="48"  width="130" height="220" rx="0" fill="#27500A" opacity="0.82"/>
<rect x="510" y="48"  width="130" height="220" rx="0" fill="#BA7517" opacity="0.72"/>

<!-- Métricas Paisagem B -->
<text class="ts" x="510" y="283" text-anchor="middle">PLAND floresta = 50%  |  NP = 1  |  ED baixa  |  AI alto</text>
<text class="ts" x="510" y="298" text-anchor="middle" fill="#0F6E56">Baixa fragmentação · Pouca borda · 1 grande patch</text>

<!-- Símbolo de igual entre as duas -->
<text style="font-size:22px; font-weight:700; fill:#185FA5" x="340" y="170" text-anchor="middle">≠</text>
<text class="ts" x="340" y="188" text-anchor="middle" fill="#185FA5">config.</text>
<text style="font-size:16px; font-weight:600; fill:#27500A" x="340" y="132" text-anchor="middle">=</text>
<text class="ts" x="340" y="150" text-anchor="middle" fill="#27500A">compos.</text>

<!-- Legenda -->
<rect x="200" y="315" width="14" height="14" rx="2" fill="#27500A" opacity="0.82"/>
<text class="ts" x="220" y="326">Floresta</text>
<rect x="295" y="315" width="14" height="14" rx="2" fill="#BA7517" opacity="0.72"/>
<text class="ts" x="315" y="326">Agricultura</text>

<text class="ts" x="340" y="338" text-anchor="middle">Figura 1 — Duas paisagens com composição idêntica (50% cada classe) mas configuração radicalmente diferente</text>
</svg>
