<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:12px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:10px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<text style="font-size:13px;font-weight:600;fill:#1a1a18" x="340" y="20" text-anchor="middle">Tipologia de paisagens politicamente contestadas no Brasil</text>

<!-- Card 1: Terras Indígenas -->
<rect x="20" y="34" width="144" height="170" rx="8" fill="#173404" opacity="0.85"/>
<text style="font-size:11px;font-weight:700;fill:#C0DD97" x="92" y="56" text-anchor="middle">Terras Indígenas</text>
<text class="ts" x="92" y="76" text-anchor="middle" fill="#97C459">14% do território</text>
<text class="ts" x="92" y="94" text-anchor="middle" fill="#97C459">nacional (FUNAI)</text>
<text class="ts" x="30" y="116" fill="#97C459">▸ Baixo desmatamento</text>
<text class="ts" x="30" y="132" fill="#97C459">▸ Pressão garimpeira</text>
<text class="ts" x="30" y="148" fill="#97C459">▸ Marco temporal (STF</text>
<text class="ts" x="30" y="162" fill="#97C459">  2023 — inconstituc.)</text>
<text class="ts" x="30" y="178" fill="#97C459">▸ 258 violências em</text>
<text class="ts" x="30" y="194" fill="#97C459">  2025 (CPT)</text>

<!-- Card 2: Territórios Quilombolas -->
<rect x="174" y="34" width="144" height="170" rx="8" fill="#633806" opacity="0.82"/>
<text style="font-size:11px;font-weight:700;fill:white" x="246" y="56" text-anchor="middle">Territórios Quilombolas</text>
<text class="ts" x="246" y="76" text-anchor="middle" fill="#F5E9C8">4,3% titulados</text>
<text class="ts" x="246" y="92" text-anchor="middle" fill="#F5E9C8">(Censo 2022)</text>
<text class="ts" x="184" y="114" fill="#F5E9C8">▸ Maranhão: maior</text>
<text class="ts" x="184" y="130" fill="#F5E9C8">  concentração</text>
<text class="ts" x="184" y="146" fill="#F5E9C8">▸ 244 violências em</text>
<text class="ts" x="184" y="162" fill="#F5E9C8">  2025 (CPT)</text>
<text class="ts" x="184" y="178" fill="#F5E9C8">▸ Titulação irregular</text>
<text class="ts" x="184" y="194" fill="#F5E9C8">  como vetor conflito</text>

<!-- Card 3: Unidades de Conservação -->
<rect x="328" y="34" width="144" height="170" rx="8" fill="#0C447C" opacity="0.82"/>
<text style="font-size:11px;font-weight:700;fill:white" x="400" y="56" text-anchor="middle">Unidades de Conservação</text>
<text class="ts" x="400" y="76" text-anchor="middle" fill="#B5D4F4">~17% do território</text>
<text class="ts" x="400" y="92" text-anchor="middle" fill="#B5D4F4">(MMA 2024)</text>
<text class="ts" x="338" y="114" fill="#B5D4F4">▸ Conflito com pop.</text>
<text class="ts" x="338" y="130" fill="#B5D4F4">  pré-existentes</text>
<text class="ts" x="338" y="146" fill="#B5D4F4">▸ "Conservação fortaleza"</text>
<text class="ts" x="338" y="162" fill="#B5D4F4">  vs. socioambiental</text>
<text class="ts" x="338" y="178" fill="#B5D4F4">▸ Paper parks: UCs</text>
<text class="ts" x="338" y="194" fill="#B5D4F4">  sem proteção efetiva</text>

<!-- Card 4: Fronteira Agropecuária -->
<rect x="482" y="34" width="172" height="170" rx="8" fill="#A32D2D" opacity="0.78"/>
<text style="font-size:11px;font-weight:700;fill:white" x="568" y="56" text-anchor="middle">Fronteira Agropecuária</text>
<text class="ts" x="568" y="76" text-anchor="middle" fill="#FECACA">Arco do Desmatamento</text>
<text class="ts" x="568" y="92" text-anchor="middle" fill="#FECACA">MATOPIBA · Cerrado</text>
<text class="ts" x="492" y="114" fill="#FECACA">▸ Grilagem de terras</text>
<text class="ts" x="492" y="130" fill="#FECACA">▸ Expulsão de posseiros</text>
<text class="ts" x="492" y="146" fill="#FECACA">▸ Soja e pecuária vs.</text>
<text class="ts" x="492" y="162" fill="#FECACA">  florestas e savanas</text>
<text class="ts" x="492" y="178" fill="#FECACA">▸ Aceleração pós-2019</text>
<text class="ts" x="492" y="194" fill="#FECACA">  (retrocessos legais)</text>

<!-- Faixa inferior: o que une todos -->
<rect x="20" y="218" width="634" height="50" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text style="font-size:12px;font-weight:600;fill:#173404" x="337" y="238" text-anchor="middle">O que todas têm em comum: paisagem como território em disputa</text>
<text class="ts" x="337" y="258" text-anchor="middle">A paisagem não é apenas um objeto ecológico — é também um objeto político, um campo de relações de poder materializadas no espaço</text>

<text class="ts" x="340" y="292" text-anchor="middle">Figura 3 — Tipologia de paisagens politicamente contestadas no Brasil (CPT 2025; FUNAI; MMA 2024)</text>
</svg>
