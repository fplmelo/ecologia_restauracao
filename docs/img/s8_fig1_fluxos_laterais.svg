<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Setas de entrada: precipitação e deposição atmosférica -->
<line x1="80" y1="22" x2="80" y2="58" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="82" y="18" fill="#185FA5">precipitação</text>
<line x1="340" y1="22" x2="340" y2="58" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="342" y="18" fill="#185FA5">deposição atm.</text>

<!-- Patch 1: Floresta -->
<rect x="30" y="60" width="150" height="160" rx="8" fill="#27500A" opacity="0.82"/>
<text class="th" x="105" y="88" text-anchor="middle" fill="#C0DD97">Floresta</text>
<text class="ts" x="105" y="106" text-anchor="middle" fill="#97C459">Alta NPP</text>
<text class="ts" x="105" y="122" text-anchor="middle" fill="#97C459">Acúmulo de C</text>
<text class="ts" x="105" y="138" text-anchor="middle" fill="#97C459">Retenção de N, P</text>
<text class="ts" x="105" y="154" text-anchor="middle" fill="#97C459">Regulação hídrica</text>

<!-- Patch 2: Agricultura -->
<rect x="215" y="60" width="140" height="160" rx="8" fill="#BA7517" opacity="0.72"/>
<text class="th" x="285" y="88" text-anchor="middle" fill="white">Agricultura</text>
<text class="ts" x="285" y="106" text-anchor="middle" fill="#F5E9C8">Alta exportação</text>
<text class="ts" x="285" y="122" text-anchor="middle" fill="#F5E9C8">de nutrientes</text>
<text class="ts" x="285" y="138" text-anchor="middle" fill="#F5E9C8">Erosão do solo</text>
<text class="ts" x="285" y="154" text-anchor="middle" fill="#F5E9C8">Lixiviação de N</text>

<!-- Patch 3: Zona ripária -->
<rect x="390" y="60" width="130" height="160" rx="8" fill="#0C447C" opacity="0.75"/>
<text class="th" x="455" y="88" text-anchor="middle" fill="white">Zona Ripária</text>
<text class="ts" x="455" y="106" text-anchor="middle" fill="#B5D4F4">Filtro de nutrientes</text>
<text class="ts" x="455" y="122" text-anchor="middle" fill="#B5D4F4">Desnitrificação</text>
<text class="ts" x="455" y="138" text-anchor="middle" fill="#B5D4F4">Buffer agríc.→rio</text>
<text class="ts" x="455" y="154" text-anchor="middle" fill="#B5D4F4">Regulação temp.</text>

<!-- Patch 4: Curso d'água -->
<rect x="550" y="60" width="110" height="160" rx="8" fill="#185FA5" opacity="0.78"/>
<text class="th" x="605" y="88" text-anchor="middle" fill="white">Rio</text>
<text class="ts" x="605" y="106" text-anchor="middle" fill="#E6F1FB">Transporte</text>
<text class="ts" x="605" y="122" text-anchor="middle" fill="#E6F1FB">lateral de N, P</text>
<text class="ts" x="605" y="138" text-anchor="middle" fill="#E6F1FB">Exportação para</text>
<text class="ts" x="605" y="154" text-anchor="middle" fill="#E6F1FB">estuário/oceano</text>

<!-- Fluxos laterais horizontais -->
<!-- Floresta → Agricultura: matéria orgânica, sementes -->
<path d="M182 105 L213 105" fill="none" stroke="#EF9F27" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="197" y="99" text-anchor="middle" fill="#BA7517">MO, sementes</text>

<!-- Agricultura → Zona ripária: escoamento, N, P -->
<path d="M357 130 L388 130" fill="none" stroke="#A32D2D" stroke-width="2.5" marker-end="url(#arrow)"/>
<text class="ts" x="372" y="124" text-anchor="middle" fill="#A32D2D">N, P, sedimento</text>

<!-- Zona ripária → Rio: fluxo filtrado -->
<path d="M522 148 L548 148" fill="none" stroke="#378ADD" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="534" y="143" text-anchor="middle" fill="#185FA5">N filtrado</text>

<!-- Fluxo de retorno: rio → floresta (subsidio ripário) -->
<path d="M555 195 Q340 230 185 205" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="244" text-anchor="middle" fill="#185FA5">subsídio hídrico / aluvião</text>

<!-- Setas de saída: escoamento e evapotranspiração -->
<line x1="80" y1="222" x2="80" y2="252" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="82" y="268" fill="#5F5E5A">ET</text>
<line x1="660" y1="140" x2="680" y2="140" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="600" y="245" fill="#185FA5">exportação</text>
<text class="ts" x="600" y="258" fill="#185FA5">para estuário</text>

<!-- Seta solar de entrada -->
<line x1="480" y1="22" x2="480" y2="58" stroke="#EF9F27" stroke-width="2.5" marker-end="url(#arrow)"/>
<text class="ts" x="500" y="18" fill="#BA7517">radiação solar (E)</text>

<!-- Legenda fluxos -->
<line x1="30" y1="305" x2="60" y2="305" stroke="#A32D2D" stroke-width="2.5"/>
<text class="ts" x="68" y="310">Fluxo de nutrientes (alto)</text>
<line x1="220" y1="305" x2="250" y2="305" stroke="#378ADD" stroke-width="2" stroke-dasharray="5,3"/>
<text class="ts" x="258" y="310">Fluxo hídrico / filtrado</text>
<line x1="410" y1="305" x2="440" y2="305" stroke="#EF9F27" stroke-width="1.8" stroke-dasharray="5,3"/>
<text class="ts" x="448" y="310">Fluxo biológico (MO, sementes)</text>

<text class="ts" x="340" y="338" text-anchor="middle">Figura 1 — Fluxos laterais de energia e matéria entre elementos do mosaico de paisagem (Forman &amp; Godron 1986)</text>
</svg>
