<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Linha do tempo -->
<line x1="50" y1="260" x2="640" y2="260" stroke="#1a1a18" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="th" x="340" y="290" text-anchor="middle">Tempo</text>

<!-- Eixo Y riqueza -->
<line x1="50" y1="260" x2="50" y2="30" stroke="#1a1a18" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="30" y="148" text-anchor="middle" transform="rotate(-90 30 148)">Riqueza de espécies</text>
<text class="ts" x="42" y="56" text-anchor="end">S₀</text>
<text class="ts" x="42" y="260" text-anchor="end">0</text>

<!-- Marco: fragmentação -->
<line x1="230" y1="30" x2="230" y2="265" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="6,3"/>
<text class="th" x="230" y="22" text-anchor="middle" fill="#A32D2D">Fragmentação</text>

<!-- Marco: equilíbrio esperado -->
<line x1="530" y1="30" x2="530" y2="265" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="6,3"/>
<text class="th" x="530" y="22" text-anchor="middle" fill="#BA7517">Equilíbrio</text>
<text class="th" x="530" y="38" text-anchor="middle" fill="#BA7517">esperado</text>

<!-- Riqueza atual (plateau temporário) -->
<path d="M50 55 L230 55" fill="none" stroke="#27500A" stroke-width="3"/>
<!-- Declínio lento após fragmentação -->
<path d="M230 55 Q320 65 400 100 Q470 135 530 175" fill="none" stroke="#27500A" stroke-width="3"/>
<!-- Equilíbrio final mais baixo -->
<path d="M530 175 L640 175" fill="none" stroke="#27500A" stroke-width="3"/>

<!-- Linha tracejada do equilíbrio esperado -->
<path d="M230 55 Q280 55 300 100 Q350 170 530 175" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="8,4"/>

<!-- Área da dívida de extinção -->
<path d="M230 55 Q280 55 300 100 Q350 170 530 175 Q470 135 400 100 Q320 65 230 55Z" fill="#FCEBEB" opacity="0.55"/>

<!-- Rótulo da dívida -->
<text class="th" x="370" y="108" text-anchor="middle" fill="#A32D2D">Extinção em Dívida</text>
<text class="ts" x="370" y="124" text-anchor="middle" fill="#A32D2D">(extinction debt)</text>
<text class="ts" x="370" y="140" text-anchor="middle" fill="#A32D2D">Espécies "condenadas" mas</text>
<text class="ts" x="370" y="155" text-anchor="middle" fill="#A32D2D">ainda presentes hoje</text>

<!-- Rótulo S₀ -->
<line x1="52" y1="55" x2="48" y2="55" stroke="#1a1a18" stroke-width="1"/>
<!-- Rótulo S* -->
<text class="ts" x="42" y="178" text-anchor="end">S*</text>
<line x1="52" y1="175" x2="48" y2="175" stroke="#1a1a18" stroke-width="1"/>

<!-- Legenda -->
<line x1="55" y1="308" x2="85" y2="308" stroke="#27500A" stroke-width="3"/>
<text class="ts" x="93" y="313">Riqueza observada</text>
<line x1="220" y1="308" x2="250" y2="308" stroke="#888780" stroke-width="1.5" stroke-dasharray="7,4"/>
<text class="ts" x="258" y="313">Trajetória esperada (equilíbrio)</text>
<rect x="430" y="300" width="14" height="14" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text class="ts" x="452" y="313">Extinção em dívida</text>
</svg>
