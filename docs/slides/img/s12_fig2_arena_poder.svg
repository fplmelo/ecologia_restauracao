<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size:13px; font-weight:600; fill:#1a1a18; }
    .ts { font-size:11px; font-weight:400; fill:#2c2c2a; }
  </style>
</defs>

<!-- Centro: a paisagem -->
<ellipse cx="340" cy="165" rx="70" ry="55" fill="#EAF3DE" stroke="#639922" stroke-width="2"/>
<text class="th" x="340" y="158" text-anchor="middle" fill="#173404">PAISAGEM</text>
<text class="ts" x="340" y="175" text-anchor="middle" fill="#27500A">arena de disputa</text>

<!-- Ator 1: Agronegócio (direita-cima) -->
<rect x="490" y="30" width="165" height="64" rx="8" fill="#BA7517" opacity="0.80"/>
<text style="font-size:12px;font-weight:600;fill:white" x="573" y="52" text-anchor="middle">Agronegócio</text>
<text class="ts" x="573" y="68" text-anchor="middle" fill="#F5E9C8">commodity · expansão</text>
<text class="ts" x="573" y="82" text-anchor="middle" fill="#F5E9C8">acumulação · capital</text>
<line x1="490" y1="62" x2="415" y2="140" stroke="#BA7517" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Ator 2: Estado (cima-centro) -->
<rect x="255" y="20" width="170" height="54" rx="8" fill="#0C447C" opacity="0.80"/>
<text style="font-size:12px;font-weight:600;fill:white" x="340" y="42" text-anchor="middle">Estado</text>
<text class="ts" x="340" y="58" text-anchor="middle" fill="#B5D4F4">licenciamento · omissão</text>
<text class="ts" x="340" y="70" text-anchor="middle" fill="#B5D4F4">demarcação · regulação</text>
<line x1="340" y1="74" x2="340" y2="110" stroke="#0C447C" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Ator 3: Povos indígenas / comunidades (esquerda-cima) -->
<rect x="25" y="30" width="165" height="64" rx="8" fill="#173404" opacity="0.85"/>
<text style="font-size:12px;font-weight:600;fill:#C0DD97" x="108" y="52" text-anchor="middle">Povos e Comunidades</text>
<text class="ts" x="108" y="68" text-anchor="middle" fill="#97C459">indígenas · quilombolas</text>
<text class="ts" x="108" y="82" text-anchor="middle" fill="#97C459">pescadores · camponeses</text>
<line x1="192" y1="62" x2="275" y2="140" stroke="#173404" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Ator 4: Conservação (esquerda-baixo) -->
<rect x="25" y="240" width="165" height="64" rx="8" fill="#185FA5" opacity="0.78"/>
<text style="font-size:12px;font-weight:600;fill:white" x="108" y="262" text-anchor="middle">Conservação</text>
<text class="ts" x="108" y="278" text-anchor="middle" fill="#E6F1FB">UCs · ONGs ambientais</text>
<text class="ts" x="108" y="292" text-anchor="middle" fill="#E6F1FB">science-based policy</text>
<line x1="192" y1="272" x2="275" y2="205" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Ator 5: Mineração / infraestrutura (direita-baixo) -->
<rect x="490" y="240" width="165" height="64" rx="8" fill="#A32D2D" opacity="0.80"/>
<text style="font-size:12px;font-weight:600;fill:white" x="573" y="262" text-anchor="middle">Mineração / Infra.</text>
<text class="ts" x="573" y="278" text-anchor="middle" fill="#FECACA">garimpo ilegal · barragens</text>
<text class="ts" x="573" y="292" text-anchor="middle" fill="#FECACA">rodovias · energia</text>
<line x1="490" y1="272" x2="415" y2="205" stroke="#A32D2D" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Ator 6: Mercado imobiliário (baixo-centro) -->
<rect x="255" y="262" width="170" height="54" rx="8" fill="#888780" opacity="0.75"/>
<text style="font-size:12px;font-weight:600;fill:white" x="340" y="284" text-anchor="middle">Mercado de terras</text>
<text class="ts" x="340" y="300" text-anchor="middle" fill="#F5F4F0">especulação fundiária</text>
<line x1="340" y1="262" x2="340" y2="222" stroke="#888780" stroke-width="2" marker-end="url(#arrow)"/>

<text class="ts" x="340" y="328" text-anchor="middle">Figura 2 — A paisagem como arena de disputa: múltiplos atores com interesses e poderes desiguais</text>
</svg>
